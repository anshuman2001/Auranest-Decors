<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Minimal Collection — Ceramic Planters, Figurines & Wind Chimes | Auranest Decors</title>
<meta name="description" content="Shop minimal ceramic planters, figurines, terracotta pots and wind chimes. Clean forms, natural materials, Indian craft. Free shipping ₹999+."/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://www.auranestdecors.com/store/minimal.html"/>
<link rel="icon" type="image/jpeg" href="../assets/logo.jpg"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Auranest Decors"/>
<meta property="og:title" content="Minimal Collection — Auranest Decors"/>
<meta property="og:description" content="Shop minimal ceramic planters, figurines, terracotta pots and wind chimes. Clean forms, natural materials, Indian craft. Free shipping ₹999+."/>
<meta property="og:url" content="https://www.auranestdecors.com/store/minimal.html"/>
<meta property="og:image" content="https://m.media-amazon.com/images/I/61LIUAt9o6L.jpg"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f5;--white:#fff;--charcoal:#1c1a18;--mid:#5a5550;--light:#aca89f;--gold:#b8934a;--gold-lt:#d4a85c;--gold-pale:#f5ecd8;--border:#ece8e1}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--charcoal)}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(250,248,245,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 5%;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--charcoal);text-decoration:none}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{text-decoration:none;color:var(--mid);font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
/* HERO */
.cat-hero{background:linear-gradient(135deg,#1c1a18 0%,#2d2721 100%);color:#fff;text-align:center;padding:5rem 5% 4rem}
.cat-hero-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.cat-hero-title{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:400;margin-bottom:.8rem}
@media(max-width:600px){.cat-hero-title{font-size:2rem}}
.cat-hero-sub{font-size:.85rem;color:rgba(255,255,255,.6);letter-spacing:.05em}
/* FILTER */
.filter-section{padding:1.5rem 5%;border-bottom:1px solid var(--border);background:var(--white);display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
.sub-pill{background:none;border:1px solid var(--border);color:var(--mid);padding:6px 16px;font-family:'Outfit',sans-serif;font-size:.75rem;letter-spacing:.05em;cursor:pointer;transition:all .2s}
.sub-pill:hover,.sub-pill.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.sub-pill-all{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
/* GRID */
.prod-section{padding:3rem 5%}
.prod-count{font-size:.78rem;color:var(--light);margin-bottom:1.5rem}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem}
.prod-card{background:var(--white);border:1px solid var(--border);cursor:pointer;transition:all .3s;overflow:hidden}
.prod-card:hover{border-color:var(--gold);box-shadow:0 8px 30px rgba(0,0,0,.08);transform:translateY(-3px)}
.prod-img-wrap{aspect-ratio:1;overflow:hidden;background:#f0ece6;position:relative}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.prod-card:hover .prod-img-wrap img{transform:scale(1.05)}
.prod-tag{position:absolute;top:10px;left:10px;background:var(--gold);color:#fff;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .6rem}
.prod-body{padding:1rem}
.prod-sub{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.3;margin-bottom:.5rem}
.prod-price{font-size:1rem;font-weight:600;color:var(--charcoal)}
.prod-mrp{font-size:.75rem;color:var(--light);text-decoration:line-through;margin-left:6px;font-weight:400}
.prod-cta{display:block;margin-top:.8rem;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);text-decoration:none}
.loading-state{text-align:center;padding:6rem;color:var(--light);grid-column:1/-1}
/* FOOTER */
footer{background:var(--charcoal);color:rgba(255,255,255,.6);text-align:center;padding:2.5rem;font-size:.8rem;margin-top:4rem}
footer a{color:rgba(255,255,255,.4);text-decoration:none;margin:0 .8rem;transition:color .2s}
footer a:hover{color:var(--gold)}
</style>
</head>
<body>
<nav>
  <a href="../store/" class="nav-brand">Auranest Decors</a>
  <ul class="nav-links">
    <li><a href="artisan.html" >🎨 Artisan</a></li>
    <li><a href="woodcraft.html" >🪵 Woodcraft</a></li>
    <li><a href="minimal.html" class="active">🏺 Minimal</a></li>
    <li><a href="../catalog/">Catalogue</a></li>
  </ul>
</nav>

<div class="cat-hero">
  <div class="cat-hero-label">🏺 Collection</div>
  <h1 class="cat-hero-title">Minimal Collection</h1>
  <p class="cat-hero-sub">Ceramic Planters · Figurines · Wind Chimes · Terracotta</p>
</div>

<div class="filter-section">
  <button class="sub-pill sub-pill-all" onclick="filterSub('')" id="pill-all">All Minimal</button>
  <button class="sub-pill" onclick="filterSub('Decorative Pots')">Decorative Pots</button><button class="sub-pill" onclick="filterSub('Ceramic Figurines')">Ceramic Figurines</button><button class="sub-pill" onclick="filterSub('Wind Chimes')">Wind Chimes</button><button class="sub-pill" onclick="filterSub('Natural Terracotta')">Natural Terracotta</button><button class="sub-pill" onclick="filterSub('Modern Decor')">Modern Decor</button>
</div>

<section class="prod-section">
  <div class="prod-count" id="prodCount"></div>
  <div class="prod-grid" id="prodGrid">
    <div class="loading-state">
      <p>Loading products…</p>
    </div>
  </div>
</section>

<footer>
  <div style="margin-bottom:.8rem;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:rgba(255,255,255,.8)">Auranest Decors</div>
  <a href="../store/">Home</a>
  <a href="artisan.html">Artisan</a>
  <a href="woodcraft.html">Woodcraft</a>
  <a href="minimal.html">Minimal</a>
  <a href="../catalog/">Catalogue</a>
  <a href="contact.html">Contact</a>
  <div style="margin-top:1.2rem;font-size:.7rem;opacity:.4">© 2025 Auranest Decors · Made in India 🇮🇳</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey: "AIzaSyAMkNFmL_amzlWMBxyzlVbn06GhZJGnadk",
  authDomain: "auranest-decors.firebaseapp.com",
  projectId: "auranest-decors",
  storageBucket: "auranest-decors.firebasestorage.app",
  messagingSenderId: "55244789649",
  appId: "1:55244789649:web:0aab804a8933ce0cf6ec30"
});
const db  = getFirestore(app);
let _allProducts = [];

async function loadProducts() {
  const grid = document.getElementById('prodGrid');
  try {
    const snap = await getDocs(query(collection(db,'products'), where('category','==','Minimal')));
    snap.forEach(d => _allProducts.push({id: d.id, ...d.data()}));
    if (!_allProducts.length) {
      grid.innerHTML = '<div class="loading-state"><p>Products coming soon — check back shortly!</p></div>';
      return;
    }
    renderProducts(_allProducts);
  } catch(e) {
    grid.innerHTML = '<div class="loading-state"><p>Could not load products. Please try again.</p></div>';
  }
}

function renderProducts(list) {
  const grid = document.getElementById('prodGrid');
  document.getElementById('prodCount').textContent = list.length + ' products';
  grid.innerHTML = list.map(p => {
    const img   = p.images?.[0] || p.image || '';
    const price = p.price ? `₹${Number(p.price).toLocaleString('en-IN')}` : '';
    const mrp   = p.mrp && p.mrp > p.price ? `<span class="prod-mrp">₹${Number(p.mrp).toLocaleString('en-IN')}</span>` : '';
    return `<div class="prod-card" onclick="window.location.href='../store/?product=${p.id}'">
      <div class="prod-img-wrap">
        ${img ? `<img src="${img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'"/>` : ''}
        ${p.tag ? `<span class="prod-tag">${p.tag}</span>` : ''}
      </div>
      <div class="prod-body">
        <div class="prod-sub">${p.subCategory || 'Minimal'}</div>
        <div class="prod-name">${p.name}</div>
        ${price ? `<div class="prod-price">${price}${mrp}</div>` : ''}
        <span class="prod-cta">View Product →</span>
      </div>
    </div>`;
  }).join('');
}

window.filterSub = function(sub) {
  document.querySelectorAll('.sub-pill').forEach(b => b.classList.remove('active','sub-pill-all'));
  const activeBtn = sub
    ? document.querySelector(`.sub-pill[onclick="filterSub('${sub}')"]`)
    : document.getElementById('pill-all');
  if (activeBtn) activeBtn.classList.add('active','sub-pill-all');
  const filtered = sub ? _allProducts.filter(p => p.subCategory === sub) : _allProducts;
  renderProducts(filtered.length ? filtered : _allProducts);
};

loadProducts();
</script>
</body>
</html>
