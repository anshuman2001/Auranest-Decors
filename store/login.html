<!-- Firebase -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber,
         onAuthStateChanged, signOut,
         browserLocalPersistence, setPersistence }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyAMkNFmL_amzlWMBxyzlVbn06GhZJGnadk",
  authDomain:"auranest-decors.firebaseapp.com",
  projectId:"auranest-decors",
  storageBucket:"auranest-decors.firebasestorage.app",
  messagingSenderId:"55244789649",
  appId:"1:55244789649:web:0aab804a8933ce0cf6ec30"
});
const auth = getAuth(app);
const db   = getFirestore(app);

setPersistence(auth, browserLocalPersistence).catch(() => {});

const params = new URLSearchParams(location.search);
const NEXT   = params.get('next') || 'account.html';

window._auth      = auth;
window._RV        = RecaptchaVerifier;
window._signPhone = (phone, verifier) => signInWithPhoneNumber(auth, phone, verifier);
window._onAuth    = (cb) => onAuthStateChanged(auth, cb);
window._NEXT      = NEXT;

window._checkOrCreateCustomer = async (uid, phone) => {
  const ref = doc(db, 'customers', uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    try { await updateDoc(ref, { lastLogin: serverTimestamp() }); } catch {}
    const data = snap.data();
    if (data.name) localStorage.setItem('auranest_name', data.name);
    return { uid, ...data };
  }
  const savedName = localStorage.getItem('auranest_name') || '';
  const newDoc = { mobile: phone, name: savedName, createdAt: serverTimestamp(), lastLogin: serverTimestamp() };
  try { await setDoc(ref, newDoc); } catch {}
  return { uid, ...newDoc };
};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;min-height:100%}
:root{
  --bg:#faf8f5;--white:#fff;--charcoal:#1c1a18;--mid:#5a5550;--light:#aca89f;
  --gold:#b8934a;--gold-lt:#d4a85c;--gold-pale:#f5ecd8;--border:#ece8e1
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--charcoal);min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(250,248,245,.96);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:0 5%;height:62px;
  display:flex;align-items:center;justify-content:space-between
}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--charcoal);text-decoration:none}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{text-decoration:none;color:var(--mid);font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
@media(max-width:640px){.nav-links{display:none}}

/* ── MAIN WRAPPER ── */
.page-body{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem}

/* ── CARD ── */
.auth-card{
  background:var(--white);border:1px solid var(--border);
  width:100%;max-width:420px;
  padding:2.8rem 2.4rem 2.4rem;
  box-shadow:0 12px 48px rgba(28,26,24,.07)
}
.card-logo-fallback{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-lt));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#fff;
  margin:0 auto 1.4rem
}
.card-title{
  font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;
  text-align:center;color:var(--charcoal);margin-bottom:.35rem;letter-spacing:.02em
}
.card-sub{font-size:.82rem;color:var(--mid);text-align:center;margin-bottom:2rem;line-height:1.55}

/* ── PHASE PANELS ── */
.phase{display:none}.phase.active{display:block}

/* ── INPUTS ── */
.input-group{margin-bottom:1.1rem}
.input-label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:.45rem;font-weight:500}
.input-row{display:flex}
.input-prefix{
  display:flex;align-items:center;padding:0 .9rem;
  background:var(--gold-pale);border:1.5px solid var(--border);border-right:none;
  font-size:.85rem;font-weight:600;color:var(--charcoal);white-space:nowrap;flex-shrink:0
}
input[type=text],input[type=tel]{
  width:100%;padding:.78rem .95rem;
  border:1.5px solid var(--border);background:var(--white);
  font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--charcoal);
  outline:none;transition:border-color .2s,box-shadow .2s
}
input[type=text]:focus,input[type=tel]:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,147,74,.12)
}
.input-row input{flex:1;border-radius:0}

/* ── OTP BOXES ── */
.otp-row{display:flex;gap:.65rem;justify-content:center;margin-bottom:.4rem}
.otp-box{
  width:46px;height:52px;border:2px solid var(--border);
  text-align:center;font-size:1.4rem;font-weight:700;font-family:'Outfit',sans-serif;
  background:var(--white);color:var(--charcoal);outline:none;
  transition:border-color .2s,box-shadow .2s
}
.otp-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,147,74,.15)}

/* ── BUTTON ── */
.btn{
  width:100%;padding:.85rem 1rem;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;
  font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem
}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#a5823e}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}

/* ── SPINNER ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0
}

/* ── ERROR / INFO ── */
.err{font-size:.78rem;color:#c0392b;margin-top:.5rem;line-height:1.5;padding:.5rem .7rem;background:#fff5f5;border-left:3px solid #c0392b}
.info{font-size:.78rem;color:var(--mid);text-align:center;margin-top:.8rem;line-height:1.5}
.lnk{color:var(--gold);background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;text-decoration:underline;padding:0}
.lnk:hover{color:#a5823e}
.divider{display:flex;align-items:center;gap:.9rem;margin:1.4rem 0}
.divider span{font-size:.73rem;color:var(--light)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.guest-link{display:block;text-align:center;font-size:.8rem;color:var(--mid);margin-top:1rem;cursor:pointer;background:none;border:none;width:100%;font-family:inherit;padding:.4rem;transition:color .2s}
.guest-link:hover{color:var(--gold)}
.timer{font-size:.78rem;color:var(--light);text-align:center;margin-top:.6rem}
.back-link{
  display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--mid);
  background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:1.2rem;padding:0;transition:color .2s
}
.back-link:hover{color:var(--gold)}

/* ── FOOTER ── */
footer{background:var(--charcoal);color:rgba(255,255,255,.45);text-align:center;padding:1.5rem;font-size:.75rem;margin-top:auto}
footer a{color:rgba(255,255,255,.35);text-decoration:none;margin:0 .6rem;transition:color .2s}
footer a:hover{color:var(--gold)}

@media(max-width:460px){
  .auth-card{padding:2rem 1.3rem 2rem}
  .otp-box{width:40px;height:48px;font-size:1.25rem}
}
</style>

<!-- MAIN -->
<div class="page-body">
  <div class="auth-card" id="auth-card">

    <!-- Logo -->
    <div id="logo-wrap">
      <div class="card-logo-fallback" id="logo-fallback">A</div>

    <!-- ─── PHASE: phone ─────────────────────────── -->
    <div class="phase active" id="phase-phone">

      <div class="input-group">

      <button class="back-link" id="otp-back">← Change number</button>

        <input type="text" class="otp-box" inputmode="numeric" maxlength="1"/>
        <input type="text" class="otp-box" inputmode="numeric" maxlength="1"/>
        <input type="text" class="otp-box" inputmode="numeric" maxlength="1"/>
        <input type="text" class="otp-box" inputmode="numeric" maxlength="1"/>

      </div>

<script>
function waitFor(key, cb, tries) {
  tries = tries || 0;
  if (window[key]) { cb(); return; }
  if (tries > 40) { console.error('Firebase not loaded'); return; }
  setTimeout(() => waitFor(key, cb, tries + 1), 150);
}

waitFor('_auth', init);

function init() {
  /* ── attempt logo image ── */
  const lf = document.getElementById('logo-fallback');
  const img = new Image();
  img.src = '../assets/logo.jpg';
  img.onload = () => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid var(--gold-pale);margin:0 auto 1.4rem';
    const imgEl = new Image();
    imgEl.src = '../assets/logo.jpg';
    imgEl.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
    wrap.appendChild(imgEl);
    lf.replaceWith(wrap);
  };

  /* ── already logged in? ── */
  window._onAuth(user => {
    if (user) redirect();
  });

  setupBoxNav();

  let phone          = '';
  let confirmResult  = null;
  let recapVerifier  = null;
  let timerInterval  = null;

  /* ─── HELPERS ─── */
  function showPhase(p) {
    document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
    document.getElementById('phase-' + p).classList.add('active');
  }

  function setErr(id, msg) {
    const el = document.getElementById(id);
    if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
    el.textContent = msg; el.style.display = 'block';
  }

  function setLoading(btnId, textId, loading, label) {
    const btn  = document.getElementById(btnId);
    const span = document.getElementById(textId);
    btn.disabled = loading;
    span.innerHTML = loading ? '<span class="spinner"></span>' + (label || 'Please wait…') : (label || span.textContent);
  }

  function redirect() {
    window.location.href = window._NEXT;
  }

  function getBoxVal() {
    return [...document.querySelectorAll('#otp-boxes .otp-box')].map(b => b.value).join('');
  }

  function clearBoxes() {
    document.querySelectorAll('#otp-boxes .otp-box').forEach(b => { b.value = ''; });
  }

  /* ─── RECAPTCHA ─── */
  function ensureRecaptcha() {
    if (!recapVerifier) {
      recapVerifier = new window._RV(window._auth, 'recaptcha-container', { size: 'invisible' });
    }
    return recapVerifier;
  }

  function resetRecaptcha() {
    if (recapVerifier) { try { recapVerifier.clear(); } catch {} recapVerifier = null; }
    confirmResult = null;
  }

  /* ─── TIMER ─── */
  function startTimer(secs) {
    clearInterval(timerInterval);
    const el = document.getElementById('otp-timer');
    let t = secs;
    el.textContent = 'Resend OTP in ' + t + 's';
    timerInterval = setInterval(() => {
      t--;
      if (t <= 0) {
        clearInterval(timerInterval);
        el.innerHTML = '<button class="lnk" id="resend-link">Resend OTP</button>';
        document.getElementById('resend-link').addEventListener('click', handleResend);
      } else {
        el.textContent = 'Resend OTP in ' + t + 's';
      }
    }, 1000);
  }

  /* ─── PHONE SUBMIT ─── */
  document.getElementById('phone-btn').addEventListener('click', handlePhone);
  document.getElementById('phone-input').addEventListener('keydown', e => { if (e.key === 'Enter') handlePhone(); });

  async function handlePhone() {
    const raw = document.getElementById('phone-input').value.replace(/\D/g, '').slice(0, 10);
    setErr('phone-err', '');
    if (raw.length !== 10) { setErr('phone-err', 'Enter a valid 10-digit mobile number'); return; }
    phone = raw;
    setLoading('phone-btn', 'phone-btn-text', true, 'Sending…');
    try {
      await sendOTP();
    } catch (e) {
      setErr('phone-err', e.message || 'Something went wrong. Please try again.');
    } finally {
      setLoading('phone-btn', 'phone-btn-text', false, 'Send OTP');
    }
  }

  /* ─── SEND OTP ─── */
  async function sendOTP() {
    const verifier = ensureRecaptcha();
    try {
      confirmResult = await window._signPhone('+91' + phone, verifier);
    } catch (e) {
      resetRecaptcha();
      const msg = e.code === 'auth/invalid-phone-number' ? 'Invalid phone number.' :
                  e.code === 'auth/too-many-requests'    ? 'Too many attempts. Try later.' :
                  e.code === 'auth/captcha-check-failed' ? 'Verification failed. Refresh and retry.' :
                  e.message || 'Could not send OTP.';
      throw new Error(msg);
    }
    document.getElementById('otp-sub').textContent = '6-digit OTP sent to +91 ' + phone;
    showPhase('otp');
    clearBoxes();
    setErr('otp-err', '');
    startTimer(60);
    setTimeout(() => {
      const first = document.querySelector('#otp-boxes .otp-box');
      if (first) first.focus();
    }, 100);
  }

  /* ─── RESEND ─── */
  function handleResend() {
    resetRecaptcha();
    sendOTP().catch(e => setErr('otp-err', e.message));
  }

  /* ─── OTP VERIFY ─── */
  document.getElementById('otp-btn').addEventListener('click', handleOtp);

  async function handleOtp() {
    const code = getBoxVal();
    setErr('otp-err', '');
    if (code.length !== 6) { setErr('otp-err', 'Enter the 6-digit OTP'); return; }
    if (!confirmResult) { setErr('otp-err', 'Session expired. Request a new OTP.'); return; }
    setLoading('otp-btn', 'otp-btn-text', true, 'Verifying…');
    try {
      const cred = await confirmResult.confirm(code);
      clearInterval(timerInterval);
      await window._checkOrCreateCustomer(cred.user.uid, phone);
      redirect();
    } catch (e) {
      const msg = e.code === 'auth/invalid-verification-code' ? 'Incorrect OTP. Check and retry.' :
                  e.code === 'auth/code-expired'              ? 'OTP expired. Request a new one.' :
                  'Verification failed.';
      setErr('otp-err', msg);
    } finally {
      setLoading('otp-btn', 'otp-btn-text', false, 'Verify OTP');
    }
  }

  /* ─── BACK BUTTON ─── */
  document.getElementById('otp-back').addEventListener('click', () => {
    resetRecaptcha();
    clearInterval(timerInterval);
    showPhase('phone');
  });

  /* ─── GUEST LINK ─── */
  document.getElementById('phone-guest').addEventListener('click', () => {
    const url = new URL(window._NEXT, window.location.href);
    url.searchParams.set('guest', '1');
    window.location.href = url.toString();
  });
}

/* ─── OTP box keyboard navigation ─── */
function setupBoxNav() {
  const setup = () => {
    const boxes = [...document.querySelectorAll('#otp-boxes .otp-box')];
    boxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
        if (e.key === 'ArrowLeft'  && i > 0)              boxes[i - 1].focus();
        if (e.key === 'ArrowRight' && i < boxes.length-1) boxes[i + 1].focus();
        if (e.key === 'Enter') document.getElementById('otp-btn').click();
      });
      box.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        text.slice(0, boxes.length).split('').forEach((ch, j) => {
          if (boxes[i + j]) boxes[i + j].value = ch;
        });
        const last = Math.min(i + text.length, boxes.length - 1);
        boxes[last].focus();
      });
    });
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setup);
  else setup();
}
</script>
