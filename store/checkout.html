<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checkout – Auranest Decors</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23c49330'/><text y='.9em' x='50%' text-anchor='middle' font-size='60' font-family='serif' fill='white'>A</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet"/>

<!-- Firebase Auth + Firestore -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber,
         signInWithEmailAndPassword, EmailAuthProvider, linkWithCredential, updatePassword,
         onAuthStateChanged, signOut,
         browserLocalPersistence, setPersistence }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp,
         doc, getDoc, setDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyAMkNFmL_amzlWMBxyzlVbn06GhZJGnadk",
  authDomain:"auranest-decors.firebaseapp.com",
  projectId:"auranest-decors",
  storageBucket:"auranest-decors.firebasestorage.app",
  messagingSenderId:"55244789649",
  appId:"1:55244789649:web:0aab804a8933ce0cf6ec30"
});
const auth = getAuth(app);
const db   = getFirestore(app);

setPersistence(auth, browserLocalPersistence).catch(()=>{});

onAuthStateChanged(auth, async user => {
  window._fbUser = user || null;
  if (!user) { window._fbCustomer=null; return; }
  try {
    const snap = await getDoc(doc(db,'customers',user.uid));
    window._fbCustomer = snap.exists() ? {uid:user.uid,...snap.data()} : null;
    const addrs=[];
    try {
      const aSnap = await getDocs(collection(db,'customers',user.uid,'addresses'));
      aSnap.forEach(d=>addrs.push({id:d.id,...d.data()}));
    } catch {}
    window._fbAddresses   = addrs;
    window._fbDefaultAddr = addrs.find(a=>a.isDefault)||addrs[0]||null;
  } catch(e) { window._fbCustomer=null; }
  if (window._onAuthReady) window._onAuthReady(window._fbUser, window._fbCustomer);
});

window._fbAuth        = auth;
window._fbDb          = db;
window._RecaptchaVerifier = RecaptchaVerifier;
window._fbSignInPhone = (phone, verifier) => signInWithPhoneNumber(auth, phone, verifier);
window._fbSignInPass  = (phone, pass) => signInWithEmailAndPassword(auth, phone + '@au.auranest-usr', pass);
window._fbLinkPass    = (user, phone, pass) => linkWithCredential(user, EmailAuthProvider.credential(phone + '@au.auranest-usr', pass));
window._fbUpdatePw    = (user, pass) => updatePassword(user, pass);
window._fbSignOut     = () => signOut(auth);
window._fbQueryMobile = async (mobile) => {
  const q = query(collection(db,'customers'), where('mobile','==',mobile));
  const snap = await getDocs(q);
  return snap.empty ? null : {id:snap.docs[0].id,...snap.docs[0].data()};
};
window._checkOrCreateCustomer = async (uid, phone) => {
  try {
    const snap = await getDoc(doc(db,'customers',uid));
    const addrs=[];
    try {
      const aSnap = await getDocs(collection(db,'customers',uid,'addresses'));
      aSnap.forEach(d=>addrs.push({id:d.id,...d.data()}));
    } catch {}
    window._fbAddresses   = addrs;
    window._fbDefaultAddr = addrs.find(a=>a.isDefault)||addrs[0]||null;
    if (snap.exists()) return {uid,...snap.data()};
    const data = {mobile:phone, createdAt:serverTimestamp(), lastLogin:serverTimestamp()};
    await setDoc(doc(db,'customers',uid), data).catch(()=>{});
    return {uid, mobile:phone};
  } catch(e) { return {uid, mobile:phone}; }
};
window._saveAddress = async (uid, addr) => { await addDoc(collection(db,'customers',uid,'addresses'),addr); };
window._saveOrder = async (data) => {
  const ref = await addDoc(collection(db,'orders'),{...data,createdAt:serverTimestamp()});
  return ref.id;
};
window._initRecaptcha = () => {
  if (window._rcVerifier) return window._rcVerifier;
  try {
    window._rcVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size:'invisible' });
    window._rcVerifier.render().catch(()=>{});
  } catch(e) {}
  return window._rcVerifier;
};
setTimeout(window._initRecaptcha, 300);
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#f7f4ef;color:#1a1208;min-height:100vh;overflow-x:hidden;max-width:100vw}
:root{--gold:#c49330;--gold-lt:#f6d070;--ink:#1a1208;--muted:#7a6a4e;--border:#e8dfc8}

@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes slideUp {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes checkDraw  {to{stroke-dashoffset:0}}
@keyframes circleDraw {to{stroke-dashoffset:0}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

.a-fade {animation:fadeIn .35s ease both}
.a-slide{animation:slideUp .4s cubic-bezier(.22,1,.36,1) both}

.spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
.spinner-dark{width:17px;height:17px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* Floating labels */
.fl-wrap{position:relative;margin-bottom:1rem}
.fl-input,.fl-select{
  width:100%;padding:18px 14px 6px;border:1.5px solid var(--border);border-radius:10px;
  font-size:.93rem;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);
  outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none
}
.fl-input:focus,.fl-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,147,48,.13)}
.fl-label{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:.88rem;color:var(--muted);pointer-events:none;
  transition:all .18s cubic-bezier(.22,1,.36,1);background:#fff;padding:0 3px;line-height:1
}
.fl-input:focus~.fl-label,
.fl-input:not(:placeholder-shown)~.fl-label,
.fl-select:focus~.fl-label,
.fl-select.has-val~.fl-label{top:8px;transform:translateY(0);font-size:.73rem;color:var(--gold);font-weight:600}
.fl-arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:.8rem}

/* Progress */
.prog-wrap{position:relative;display:flex;justify-content:space-between;align-items:flex-start;padding:0 16px;margin-bottom:36px}
.prog-line{position:absolute;top:13px;left:8%;right:8%;height:2px;background:var(--border);z-index:0}
.prog-fill{height:2px;background:var(--gold);transition:width .55s ease;position:absolute;top:13px;left:8%;z-index:1}
.step-dot{
  width:27px;height:27px;border-radius:50%;border:2px solid var(--border);
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:var(--muted);z-index:2;flex-shrink:0
}
.step-dot.done{border-color:var(--gold);background:var(--gold);color:#fff}
.step-dot.active{border-color:var(--gold);background:var(--gold);color:#fff;box-shadow:0 0 0 4px rgba(196,147,48,.18)}

/* Cart item */
.ci-img{width:68px;height:68px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#f0e8d8;display:flex;align-items:center;justify-content:center;font-size:1.7rem}
.ci-img img{width:100%;height:100%;object-fit:cover}

/* Qty */
.qty-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content}
.qty-btn{width:30px;height:30px;border:none;background:#fff;cursor:pointer;font-size:1rem;color:var(--ink);transition:background .15s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#f0e8d8}
.qty-val{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border)}

/* Pay tabs */
.pay-tab{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;background:#fff;display:flex;align-items:center;gap:5px;white-space:nowrap}
.pay-tab.active{border-color:var(--gold);background:#fffbf0;color:var(--gold)}

/* OTP boxes */
.otp-box{
  width:46px;height:54px;border:2px solid var(--border);border-radius:12px;
  text-align:center;font-size:1.5rem;font-weight:700;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;background:#fff;color:var(--ink)
}
.otp-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,147,48,.18)}

/* Success SVG */
.check-circle{stroke-dasharray:170;stroke-dashoffset:170;animation:circleDraw .8s .2s cubic-bezier(.22,1,.36,1) forwards}
.check-mark{stroke-dasharray:60;stroke-dashoffset:60;animation:checkDraw .5s 1s cubic-bezier(.22,1,.36,1) forwards}
.confetti-piece{position:fixed;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:9999}

/* Promo */
.promo-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.promo-input:focus{border-color:var(--gold)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#d4c4a0;border-radius:10px}

/* Nav */
.co-nav{position:sticky;top:0;z-index:100;background:rgba(247,244,239,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:11px;font-weight:600;font-size:.88rem;font-family:'Inter',sans-serif;transition:all .2s;cursor:pointer;border:none;padding:12px 20px}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#a87e28}.btn-gold:disabled{opacity:.55;cursor:not-allowed}
.btn-outline{background:#fff;color:var(--gold);border:2px solid var(--gold)}.btn-outline:hover{background:#fffbf0}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover{background:#f0e8d8;color:var(--ink)}
.btn-dark{background:var(--ink);color:#fff}.btn-dark:hover{background:#3d2f12}.btn-dark:disabled{opacity:.55}

/* Order sidebar */
.os-row{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;padding:3px 0}
.os-label{color:var(--muted)}.os-val{font-weight:600;color:var(--ink)}

/* Card */
.co-card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid #f0e4c8}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.18);animation:slideUp .3s cubic-bezier(.22,1,.36,1) both}

.err-msg{color:#dc2626;font-size:.78rem;margin-top:-6px;margin-bottom:10px}
.success-msg{color:#16a34a;font-size:.78rem;margin-top:-6px;margin-bottom:10px}

@media(max-width:768px){
  .co-layout{flex-direction:column!important}
  .co-sidebar{width:100%!important;position:static!important}
  .otp-box{width:38px;height:46px;font-size:1.2rem}
  .co-nav{padding:10px 14px!important}
  .grid-2{grid-template-columns:1fr!important}
}
@media(max-width:480px){
  .co-nav{padding:8px 12px!important}
  .otp-box{width:34px;height:42px;font-size:1.1rem}
}
</style>
</head>
<body>
<div id="recaptcha-container" style="position:fixed;bottom:0;left:0;z-index:9999"></div>
<nav class="co-nav">
  <a href="/store/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)">
    <div style="width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-family:serif;font-weight:700;font-size:1.1rem">A</div>
    <span style="font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700">Auranest Decors</span>
  </a>
  <div style="flex:1"></div>
  <p style="font-size:.78rem;color:var(--muted);font-weight:600">🔒 Secure Checkout</p>
</nav>

<div id="app" style="max-width:960px;margin:0 auto;padding:clamp(16px,4vw,32px) clamp(10px,3vw,16px)"></div>

<script>
// ── State ────────────────────────────────────────────────
const S = {
  step: 1,        // 1=cart, 2=personal, 3=address, 4=payment, 5=success
  cart: [],
  discount: false,
  personal: { firstName:'', lastName:'', email:'', phone:'' },
  address:  { line1:'', line2:'', city:'', state:'', country:'IN', pincode:'' },
  customerId: null,
  result: null,
  showAuth: false,
  authPhase: 'phone', // phone | otp | guest
  authPhone: '',
  authOtp: ['','','','','',''],
  authErr: '',
  authLoading: false,
  authConfirm: null,
  authTimer: 0,
};

// ── Helpers ──────────────────────────────────────────────
const rupee = n => '₹' + Number(n).toLocaleString('en-IN');
const $ = id => document.getElementById(id);
const app = () => document.getElementById('app');

function trimName(n) {
  if (!n) return n;
  let s = n.split('|')[0].trim();
  if (s.length > 55) { const c = s.indexOf(',', 25); if (c > 0) s = s.slice(0, c).trim(); }
  return s || n;
}

function cdnImg(url, w) {
  if (!url) return '';
  try { return `https://res.cloudinary.com/dnqtv2gsn/image/fetch/f_auto,q_auto,w_${w}/${encodeURIComponent(url)}`; }
  catch { return url; }
}

// ── Cart Store ───────────────────────────────────────────
const CartStore = {
  get:    () => { try { return JSON.parse(localStorage.getItem('auranest_cart') || '[]'); } catch { return []; } },
  save:   c  => localStorage.setItem('auranest_cart', JSON.stringify(c)),
  clear:  () => localStorage.removeItem('auranest_cart'),
  changeQty(id, delta) {
    const c = this.get(), item = c.find(x => x.id === id);
    if (!item) return;
    item.qty += delta;
    this.save(item.qty < 1 ? c.filter(x => x.id !== id) : c);
  },
  remove: id => CartStore.save(CartStore.get().filter(x => x.id !== id))
};

// ── Totals ───────────────────────────────────────────────
function calcTotals() {
  const sub  = S.cart.reduce((a, x) => a + x.price * x.qty, 0);
  const disc = S.discount ? Math.round(sub * 0.1) : 0;
  const ship = sub >= 999 ? 0 : 79;
  return { sub, disc, ship, total: sub - disc + ship };
}

// ── Stepper ──────────────────────────────────────────────
function stepper() {
  if (S.step > 4) return '';
  const labels = ['Cart', 'Details', 'Address', 'Payment'];
  const pct = ((S.step - 1) / 3) * 84;
  const dots = labels.map((l, i) => {
    const n = i + 1;
    const cls = n < S.step ? 'done' : n === S.step ? 'active' : '';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;z-index:2">
      <div class="step-dot ${cls}">${n < S.step ? '✓' : n}</div>
      <span style="font-size:.7rem;font-weight:600;color:${n===S.step?'var(--gold)':'var(--muted)'}">${l}</span>
    </div>`;
  }).join('');
  return `<div class="prog-wrap">
    <div class="prog-line"></div>
    <div class="prog-fill" style="width:${pct}%"></div>
    ${dots}
  </div>`;
}

// ── Order Sidebar ────────────────────────────────────────
function sidebar() {
  const { sub, disc, ship, total } = calcTotals();
  const items = S.cart.map(it => `
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #faf5ea">
      <div class="ci-img" style="width:44px;height:44px;border-radius:8px;font-size:1.2rem">
        ${it.image ? `<img src="${cdnImg(it.image,120)}" alt="${trimName(it.name)}" onerror="this.style.display='none'" loading="lazy"/>` : '🏺'}
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:.8rem;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3">${trimName(it.name)}</p>
        <p style="font-size:.75rem;color:var(--muted);margin-top:2px">Qty ${it.qty}</p>
      </div>
      <p style="font-size:.8rem;font-weight:700;flex-shrink:0">${rupee(it.price * it.qty)}</p>
    </div>`).join('');
  return `<aside class="co-sidebar" style="background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.06);border:1px solid #f0e4c8;width:300px;flex-shrink:0">
    <p style="font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;margin-bottom:14px">Order Summary</p>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:14px">${items}</div>
    <div style="border-top:1px solid #f0e4c8;padding-top:10px">
      <div class="os-row"><span class="os-label">Subtotal</span><span class="os-val">${rupee(sub)}</span></div>
      ${disc > 0 ? `<div class="os-row"><span class="os-label">Discount (10%)</span><span style="color:#16a34a;font-weight:600;font-size:.88rem">−${rupee(disc)}</span></div>` : ''}
      <div class="os-row"><span class="os-label">Shipping</span><span style="color:#16a34a;font-weight:600;font-size:.88rem">${ship === 0 ? 'FREE' : rupee(ship)}</span></div>
      <div class="os-row" style="border-top:1px solid #f0e4c8;margin-top:6px;padding-top:8px">
        <span style="font-weight:700;color:var(--ink)">Total</span>
        <span style="font-weight:700;color:var(--gold);font-size:1rem">${rupee(total)}</span>
      </div>
    </div>
    <p style="font-size:.73rem;color:var(--muted);text-align:center;margin-top:12px">🔒 Secured by 256-bit SSL</p>
  </aside>`;
}

// ── Step 1: Cart ─────────────────────────────────────────
function renderCart() {
  if (S.cart.length === 0) {
    app().innerHTML = `<div class="a-fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center">
      <div style="font-size:4rem;margin-bottom:20px">🛒</div>
      <p style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:8px">Your cart is empty</p>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:24px">Discover our handcrafted collection</p>
      <a href="/store/" class="btn btn-gold">Shop Now</a>
    </div>`;
    return;
  }
  const { sub, disc, ship, total } = calcTotals();
  const items = S.cart.map(it => `
    <div style="display:flex;gap:16px;padding:16px 0;border-bottom:1px solid #faf5ea;align-items:flex-start">
      <div class="ci-img">
        ${it.image ? `<img src="${cdnImg(it.image,200)}" alt="${trimName(it.name)}" onerror="this.style.display='none'" loading="lazy"/>` : (it.icon || '🏺')}
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:.9rem;font-weight:600;margin-bottom:4px">${trimName(it.name)}</p>
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px">${rupee(it.price)} each</p>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="qty-wrap">
            <button class="qty-btn" onclick="cartQty('${it.id}',-1)">−</button>
            <span class="qty-val">${it.qty}</span>
            <button class="qty-btn" onclick="cartQty('${it.id}',1)">+</button>
          </div>
          <button onclick="cartRemove('${it.id}')" style="font-size:.75rem;color:#dc2626;background:none;border:none;cursor:pointer;font-family:inherit">Remove</button>
        </div>
      </div>
      <p style="font-size:.9rem;font-weight:700;flex-shrink:0">${rupee(it.price * it.qty)}</p>
    </div>`).join('');

  app().innerHTML = `${stepper()}
  <h2 class="a-slide" style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:24px">
    Shopping Cart <span style="color:var(--muted);font-size:1rem;font-weight:400">(${S.cart.length} item${S.cart.length!==1?'s':''})</span>
  </h2>
  <div class="co-layout a-slide" style="display:flex;gap:24px;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div class="co-card" style="margin-bottom:16px">${items}</div>
      <!-- Promo -->
      <div class="co-card" style="margin-bottom:16px">
        <p style="font-size:.82rem;font-weight:600;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Promo Code</p>
        <div style="display:flex;gap:8px">
          <input id="promoInput" class="promo-input" placeholder="Enter code (e.g. AURA10)" value="" oninput="this.value=this.value.toUpperCase()"/>
          <button class="btn btn-outline" onclick="applyPromo()" style="flex-shrink:0;padding:11px 18px">Apply</button>
        </div>
        <p id="promoMsg" style="font-size:.78rem;margin-top:6px"></p>
      </div>
      <!-- Mobile totals -->
      <div class="co-card" style="margin-bottom:24px;display:none" id="mobileTotals">

// ── Auth Modal ───────────────────────────────────────────
let authTimerInterval = null;

function startAuthTimer() {
  clearInterval(authTimerInterval);
  S.authTimer = 30;
  authTimerInterval = setInterval(() => {
    S.authTimer--;
    const el = $('authTimer');
    if (el) el.textContent = S.authTimer > 0 ? `Resend in ${S.authTimer}s` : '';
    const rb = $('resendBtn');
    if (rb) rb.style.display = S.authTimer <= 0 ? 'inline' : 'none';
    if (S.authTimer <= 0) clearInterval(authTimerInterval);
  }, 1000);
}

async function authSendOTP() {
  const ph = ($('authPhone')?.value || '').replace(/\D/g,'').slice(-10);
  if (ph.length < 10) { setAuthErr('Enter a valid 10-digit mobile number'); return; }
  S.authPhone = ph;
  setAuthLoading(true); setAuthErr('');
  try {
    const verifier = window._initRecaptcha();
    const confirm = await window._fbSignInPhone('+91' + ph, verifier);
    S.authConfirm = confirm;
    S.authPhase = 'otp';
    S.authOtp = ['','','','','',''];
    render();
    startAuthTimer();
    setTimeout(() => { $('otp0')?.focus(); }, 100);
  } catch(e) {
    const msg = e.code === 'auth/invalid-phone-number' ? 'Invalid phone number' :
                e.code === 'auth/too-many-requests'    ? 'Too many attempts. Try later.' :
                'Failed to send OTP. Try again.';
    setAuthErr(msg);
    window._rcVerifier = null;
    window._initRecaptcha();
  } finally { setAuthLoading(false); }
}

async function authVerifyOTP() {
  const code = S.authOtp.join('');
  if (code.length < 6) { setAuthErr('Enter the 6-digit OTP'); return; }
  setAuthLoading(true); setAuthErr('');
  try {
    const cred = await S.authConfirm.confirm(code);
    const user = cred.user;
    const profile = await window._checkOrCreateCustomer(user.uid, S.authPhone);
    applyProfileToPersonal(profile, S.authPhone);
    S.customerId = user.uid;
    S.showAuth = false;
    S.step = 2;
    render();
  } catch(e) {
    const msg = e.code === 'auth/invalid-verification-code' ? 'Incorrect OTP. Try again.' :
                e.code === 'auth/code-expired'              ? 'OTP expired. Resend.' :
                'Verification failed. Try again.';
    setAuthErr(msg);
  } finally { setAuthLoading(false); }
}

function authGuest() {
  clearInterval(authTimerInterval);
  S.showAuth = false;
  S.step = 2;
  render();
}

function applyProfileToPersonal(profile, phone) {
  if (!profile) return;
  const parts = (profile.name || '').trim().split(' ');
  S.personal.firstName = parts[0] || S.personal.firstName;
  S.personal.lastName  = parts.slice(1).join(' ') || S.personal.lastName;
  S.personal.email     = profile.email || S.personal.email;
  S.personal.phone     = phone || profile.mobile || S.personal.phone;
  const def = window._fbDefaultAddr;
  if (def) {
    S.address.line1   = def.line1 || '';
    S.address.line2   = def.line2 || '';
    S.address.city    = def.city  || '';
    S.address.state   = def.state || '';
    S.address.pincode = def.pincode || '';
  }
}

function setAuthErr(msg) { S.authErr = msg; const el=$('authErr'); if(el) el.textContent=msg; }
function setAuthLoading(v) { S.authLoading = v; const el=$('authSubmit'); if(el){el.disabled=v; el.innerHTML=v?'<span class="spinner"></span> Sending…':el.dataset.label||el.textContent;} }

        : `<p style="font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:20px">Enter your mobile number to track orders</p>
           <div class="fl-wrap">

      }
      <button onclick="authGuest()" style="width:100%;font-size:.82rem;color:var(--muted);font-weight:600;background:none;border:none;cursor:pointer;padding:8px;font-family:inherit">
        Continue as Guest →
      </button>
    </div>
  </div>`;
}

function otpInput(i, val) {
  S.authOtp[i] = val.replace(/\D/g,'').slice(-1);
  const el = $(`otp${i}`); if(el) el.value = S.authOtp[i];
  if (S.authOtp[i] && i < 5) { $(`otp${i+1}`)?.focus(); }
  if (S.authOtp.join('').length === 6) authVerifyOTP();
}
function otpKeydown(e, i) {
  if (e.key === 'Backspace' && !S.authOtp[i] && i > 0) { $(`otp${i-1}`)?.focus(); }
}
function authResend() {
  S.authPhase = 'phone';
  S.authErr = '';
  render();
  setTimeout(() => authSendOTP(), 100);
}

const ONLINE_COPY = ONLINE_GATEWAY === 'phonepe'

function setPayMethod(m) {
  payMethod = m;
  ['Online','Cod'].forEach(x => {

    details.innerHTML = `<p style="font-size:.82rem;color:var(--muted);background:#f7f4ef;padding:10px 14px;border-radius:8px">Pay cash when your order arrives. COD fee ₹40 may apply on orders below ₹500.</p>`;

  } else {
    details.innerHTML = `<p style="font-size:.82rem;color:var(--muted);background:#f7f4ef;padding:10px 14px;border-radius:8px">${ONLINE_COPY}</p>`;
    const payBtn = $('payBtn'); if(payBtn) payBtn.textContent = `Pay ${rupee(total)} →`;

async function placeOrder() {
  const btn = $('payBtn'); const errEl = $('payErr');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Processing…'; }
  if (errEl) errEl.textContent = '';
  const { sub, disc, ship, total } = calcTotals();
  const customer = {
    name:  `${S.personal.firstName} ${S.personal.lastName}`.trim(),
    email: S.personal.email,
    phone: S.personal.phone,
    address: S.address.line1, address2: S.address.line2,
    city:  S.address.city, state: S.address.state,
    country: S.address.country, pincode: S.address.pincode,
  };
  const items = S.cart.map(i => ({id:i.id, name:i.name, price:i.price, qty:i.qty, image:i.image||''}));

  try {
    if (payMethod === 'cod') {
      await new Promise(r => setTimeout(r, 800));
      const orderId = 'COD-' + Date.now().toString(36).toUpperCase();
      await window._saveOrder({ orderId, customerId:S.customerId||null, customer, items, subtotal:sub, discount:disc, shipping:ship, totalAmount:total, paymentMethod:'Cash on Delivery', paymentStatus:'pending', orderStatus:'pending' });
      CartStore.clear();
      S.result = { orderId, method:'Cash on Delivery', total };
      S.step = 5; render(); return;
    }
    // ── Online payment ──
    if (ONLINE_GATEWAY === 'phonepe') {
      await payWithPhonePe({ customer, items, sub, disc, ship, total });
      return; // browser redirects to PhonePe; page unloads here
    }

    // Razorpay (backup gateway)
    const res = await fetch('/api/create-order', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ amount: total, currency: 'INR' })
    });
    if (!res.ok) throw new Error('Order creation failed');
    const { razorpayOrderId, amount, currency, keyId } = await res.json();

    await new Promise((resolve, reject) => {
      const rzp = new window.Razorpay({
        key: keyId, amount, currency, order_id: razorpayOrderId,
        name: 'Auranest Decors',
        description: `${S.cart.length} item${S.cart.length>1?'s':''}`,
        prefill: { name: customer.name, email: customer.email, contact: customer.phone ? '+91'+customer.phone : '' },
        theme: { color: '#c49330' },
        handler: async (resp) => {
          try {
            const v = await fetch('/api/verify-payment', {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ razorpay_order_id:resp.razorpay_order_id, razorpay_payment_id:resp.razorpay_payment_id, razorpay_signature:resp.razorpay_signature, orderData:{ orderId:resp.razorpay_payment_id, customer, items, subtotal:sub, totalAmount:total } })
            });
            if (!v.ok) throw new Error('Payment verification failed');
            const vData = await v.json();
            await window._saveOrder({ orderId:resp.razorpay_payment_id, customerId:S.customerId||null, customer, items, subtotal:sub, discount:disc, shipping:ship, totalAmount:total, paymentMethod:'Online', paymentStatus:'paid', orderStatus:'confirmed', razorpayPaymentId:resp.razorpay_payment_id, razorpayOrderId:resp.razorpay_order_id });
            CartStore.clear();
            S.result = { orderId:resp.razorpay_payment_id, method:'Online Payment', total };
            S.step = 5; render(); resolve();
          } catch(e) { reject(e); }
        },
        modal: { ondismiss: () => reject(new Error('Payment cancelled')) }
      });
      rzp.open();
    });
  } catch(e) {
    if (errEl) errEl.textContent = e.message === 'Payment cancelled' ? 'Payment was cancelled.' : (e.message || 'Payment failed. Try again.');
    if (btn) { btn.disabled = false; btn.textContent = payMethod==='cod' ? 'Place Order (COD) →' : `Pay ${rupee(total)} →`; }
  }
}

// ── PhonePe redirect flow ────────────────────────────────
async function payWithPhonePe({ customer, items, sub, disc, ship, total }) {
  // Unique merchant order id (letters + digits, no special chars)
  const merchantOrderId = 'AN' + Date.now().toString(36).toUpperCase()
    + Math.floor(1000 + Math.random() * 9000);

  // Persist the pending order so we can save it after the customer returns
  const pending = {
    merchantOrderId, customerId: S.customerId || null,
    customer, items, subtotal: sub, discount: disc, shipping: ship, totalAmount: total,
  };
  sessionStorage.setItem('auranest_pending_order', JSON.stringify(pending));

  const redirectUrl = `${location.origin}/store/checkout.html?phonepe=return&order=${encodeURIComponent(merchantOrderId)}`;

  const res = await fetch('/api/phonepe-create-payment', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ amount: total, merchantOrderId, redirectUrl }),
  });
  if (!res.ok) throw new Error('Could not start PhonePe payment. Please try again.');
  const data = await res.json();
  if (!data.redirectUrl) throw new Error('Could not start PhonePe payment. Please try again.');

  // Hand off to PhonePe's hosted checkout
  window.location.href = data.redirectUrl;
}

// Resolve once Firebase auth has settled after the redirect reload.
function waitForAuth(timeoutMs) {
  return new Promise((resolve) => {
    if (window._fbUser) return resolve(window._fbUser);
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(window._fbUser || null); } };
    // onAuthStateChanged sets window._fbUser + calls _onAuthReady; chain onto it
    const prev = window._onAuthReady;
    window._onAuthReady = (user, profile) => { if (prev) prev(user, profile); finish(); };
    setTimeout(finish, timeoutMs || 4000);
  });
}

// ── PhonePe return handler (runs when customer comes back) ─
async function handlePhonePeReturn(merchantOrderId) {
  app().innerHTML = `<div class="a-fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center">
    <span class="spinner-dark" style="width:40px;height:40px;border-width:4px"></span>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin:24px 0 6px">Confirming your payment…</h2>
    <p style="color:var(--muted);font-size:.88rem">Please wait, do not close this window.</p>
  </div>`;

  let pending = null;
  try { pending = JSON.parse(sessionStorage.getItem('auranest_pending_order') || 'null'); } catch(e) {}

  try {
    const orderData = pending
      ? { orderId: merchantOrderId, customer: pending.customer, items: pending.items, subtotal: pending.subtotal }
      : { orderId: merchantOrderId };

    const res  = await fetch('/api/phonepe-status', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ merchantOrderId, orderData }),
    });
    const data = await res.json();

    if (data.success) {
      // Payment confirmed by backend. Try to save the order record — wait for
      // Firebase auth to restore first (it reloads async after the redirect).
      // A save failure must NOT hide the success screen: the money is taken and
      // the Shiprocket order already exists.
      if (pending && window._saveOrder) {
        try {
          await waitForAuth(4000);
          await window._saveOrder({
            orderId: merchantOrderId, customerId: pending.customerId, customer: pending.customer,
            items: pending.items, subtotal: pending.subtotal, discount: pending.discount,
            shipping: pending.shipping, totalAmount: pending.totalAmount,
            paymentMethod: 'PhonePe', paymentStatus: 'paid', orderStatus: 'confirmed',
            phonepeTxnId: data.phonepeTxnId || '', merchantOrderId,
          });
        } catch(saveErr) {
          console.error('[phonepe] order save failed (payment still OK):', saveErr);
        }
      }
      CartStore.clear();
      sessionStorage.removeItem('auranest_pending_order');
      S.result = { orderId: merchantOrderId, method: 'PhonePe', total: pending ? pending.totalAmount : 0 };
      S.step = 5; render();
    } else {
      showPhonePeFailure(data.state || 'FAILED');
    }
  } catch(e) {
    showPhonePeFailure('ERROR');
  }
}

function showPhonePeFailure(state) {
  const msg = state === 'PENDING'
    ? 'Your payment is still processing. If money was debited, it will reflect shortly — please check My Orders before retrying.'
    : 'Your payment was not completed. No money has been deducted. Please try again.';
  app().innerHTML = `<div class="a-fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:#fdecec;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:2.2rem">⚠️</div>
    <h2 style="font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;margin-bottom:10px">Payment ${state === 'PENDING' ? 'Pending' : 'Not Completed'}</h2>
    <p style="color:var(--muted);font-size:.88rem;max-width:420px;margin-bottom:28px">${msg}</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <a href="/store/checkout.html" class="btn btn-gold">Try Again</a>
      <a href="/store/" class="btn btn-outline">Back to Store</a>
    </div>
  </div>`;
}

// ── Step 5: Success ──────────────────────────────────────
function renderSuccess() {
  const r = S.result || {};
  app().innerHTML = `<div class="a-fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center">
    <svg width="90" height="90" viewBox="0 0 90 90" fill="none" style="margin-bottom:24px">
      <circle class="check-circle" cx="45" cy="45" r="40" stroke="#c49330" stroke-width="4" fill="none"/>
      <polyline class="check-mark" points="28,46 40,58 62,34" stroke="#c49330" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h2 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:8px">Order Confirmed!</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:6px">Thank you for shopping with Auranest Decors</p>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:4px">Order ID: <strong>${r.orderId||''}</strong></p>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:32px">Method: ${r.method||''} · Total: ${rupee(r.total||0)}</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <a href="/store/" class="btn btn-gold">Continue Shopping</a>
      <a href="/store/login.html" class="btn btn-outline">View My Orders</a>
    </div>
  </div>`;
  confetti();
}

function confetti() {
  const colors = ['#c49330','#f6d070','#e8dfc8','#a87e28','#fdf8f3'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${6+Math.random()*8}px;height:${10+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};transform:rotate(${Math.random()*360}deg);animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*1.5}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
}

// ── Main Render ──────────────────────────────────────────
function render() {
  // Inject auth modal above app
  const existing = document.getElementById('authModalWrap');
  if (existing) existing.remove();
  if (S.showAuth) {
    const div = document.createElement('div');
    div.id = 'authModalWrap';
    div.innerHTML = renderAuthModal();
    document.body.appendChild(div);
    // Focus phone input
    setTimeout(() => { $('authPhone')?.focus(); }, 80);
    return;
  }
  switch (S.step) {
    case 1: renderCart();    break;
    case 2: renderPersonal(); break;
    case 3: renderAddress();  break;
    case 4: renderPayment();  break;
    case 5: renderSuccess();  break;
  }
}

// ── Boot ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Load Razorpay script
  if (!document.getElementById('rzp-script')) {
    const s = document.createElement('script');
    s.id  = 'rzp-script';
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    document.head.appendChild(s);
  }

  S.cart = CartStore.get();

  // If Firebase user already logged in, pre-fill profile
  window._onAuthReady = (user, profile) => {
    if (profile) applyProfileToPersonal(profile, profile.mobile || '');
    if (user) S.customerId = user.uid;
  };
  if (window._fbCustomer) window._onAuthReady(window._fbUser, window._fbCustomer);

  // Returning from PhonePe? Verify payment instead of rendering the cart.
  const _params = new URLSearchParams(location.search);
  if (_params.get('phonepe') === 'return' && _params.get('order')) {
    handlePhonePeReturn(_params.get('order'));
    return;
  }

  render();
});
</script>
