<!-- Firebase Auth + Firestore -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber,
         signInWithEmailAndPassword, EmailAuthProvider,
         linkWithCredential, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp,
         doc, getDoc, setDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyAMkNFmL_amzlWMBxyzlVbn06GhZJGnadk",
  authDomain:"auranest-decors.firebaseapp.com",
  projectId:"auranest-decors",
  storageBucket:"auranest-decors.firebasestorage.app",
  messagingSenderId:"55244789649",
  appId:"1:55244789649:web:0aab804a8933ce0cf6ec30"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const VDOM = '@au.auranest-usr';
const SESSION_TTL = 3600000;

function setSession(uid){ localStorage.setItem('auranest_session',JSON.stringify({uid,ts:Date.now()})); }
function clearSession(){ localStorage.removeItem('auranest_session'); }
function getSession(){
  try{ const s=JSON.parse(localStorage.getItem('auranest_session'));
    if(s&&Date.now()-s.ts<SESSION_TTL) return s; }catch{}
  return null;
}
['click','keydown','touchstart'].forEach(e=>document.addEventListener(e,()=>{
  const s=getSession(); if(s) setSession(s.uid);
},{passive:true}));

onAuthStateChanged(auth, async user => {
  if(!user||!getSession()){ if(user) signOut(auth); window._fbUser=null; window._fbCustomer=null; return; }
  window._fbUser = user;
  try{
    const snap = await getDoc(doc(db,'customers',user.uid));
    window._fbCustomer = snap.exists() ? {uid:user.uid,...snap.data()} : null;
    if(window._fbCustomer){
      const addrSnap = await getDocs(collection(db,'customers',user.uid,'addresses'));
      const addrs = []; addrSnap.forEach(d=>addrs.push({id:d.id,...d.data()}));
      window._fbAddresses = addrs;
      window._fbDefaultAddr = addrs.find(a=>a.isDefault) || addrs[0] || null;
    }
  }catch(e){ window._fbCustomer=null; }
  if(window._onAuthReady) window._onAuthReady(window._fbUser, window._fbCustomer);
});

window._fbAuth        = auth;
window._fbDb          = db;
window._RecaptchaVerifier = RecaptchaVerifier;
window._fbSignInPhone = (phone, verifier) => signInWithPhoneNumber(auth, phone, verifier);
window._fbSignInPIN   = (phone, pin) => signInWithEmailAndPassword(auth, phone+VDOM, pin);
window._fbLinkPIN     = (user, phone, pin) => linkWithCredential(user, EmailAuthProvider.credential(phone+VDOM, pin));
window._fbSignOut     = () => { signOut(auth); clearSession(); };
window._setSession    = setSession;
window._getSession    = getSession;
window._clearSession  = clearSession;

window._lookupCustomer = async (phone) => {
  const snap = await getDocs(query(collection(db,'customers'),where('mobile','==',phone)));
  if(snap.empty) return null;
  const d=snap.docs[0]; return {uid:d.id,...d.data()};
};
window._createCustomer = async (uid, data) => {
  await setDoc(doc(db,'customers',uid),{...data,createdAt:serverTimestamp(),lastLogin:serverTimestamp()});
};
window._saveAddress = async (uid, addr) => {
  await addDoc(collection(db,'customers',uid,'addresses'),addr);
};
window._saveOrder = async (data) => {
  const ref = await addDoc(collection(db,'orders'),{...data,createdAt:serverTimestamp()});
  return ref.id;
};

// Pre-init reCAPTCHA at body level so it's never inside a transformed parent
window._initRecaptcha = () => {
  if (window._rcVerifier) return window._rcVerifier;
  try {
    window._rcVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size:'invisible' });
    window._rcVerifier.render().catch(()=>{});
  } catch(e) { console.warn('reCAPTCHA init failed:', e.message); }
  return window._rcVerifier;
};
setTimeout(window._initRecaptcha, 300);
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#f7f4ef;color:#1a1208;min-height:100vh;overflow-x:hidden;max-width:100vw}
:root{--gold:#c49330;--gold-lt:#f6d070;--ink:#1a1208;--muted:#7a6a4e;--border:#e8dfc8}

@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes slideUp {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.a-fade {animation:fadeIn .35s ease both}

/* Spinner */

}

/* Progress */

/* Cart item */
.ci-img{width:68px;height:68px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#f0e8d8;display:flex;align-items:center;justify-content:center;font-size:1.7rem}

/* Pay tabs */

/* Card preview */
.card-preview{

  border-radius:16px;padding:22px 20px;color:#fff;position:relative;overflow:hidden;min-height:155px;
  box-shadow:0 14px 36px rgba(0,0,0,.32)
}
.card-preview::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(196,147,48,.22),transparent 60%)}

/* OTP boxes */

  width:52px;height:58px;border:2px solid var(--border);border-radius:12px;

}

/* Success SVG */

/* Pill */

/* Promo */
.promo-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}

/* Scrollbar */

/* Nav */
.co-nav{position:sticky;top:0;z-index:100;background:rgba(247,244,239,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:14px}

/* Btn base */

<body>
<div id="recaptcha-container" style="position:fixed;bottom:0;left:0;z-index:9999"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── LOGO — reads from localStorage (set by store page) ── */
const LOGO_URL = localStorage.getItem('auranest_logo') || '';

/* ─── Trim Amazon-length product names ── */
function trimName(n) {
  if (!n) return n;
  let s = n.split('|')[0].trim();
  const SPEC = /\b(bpa|eco.friendly|multipurpose|anti.microbial|food.grade|pack of|non.stick|non.slip)\b/i;
  if (SPEC.test(s)) { const c = s.indexOf(',', 15); if (c > 0) s = s.slice(0, c).trim(); }
  else if (s.length > 55) { const c = s.indexOf(',', 25); if (c > 0) s = s.slice(0, c).trim(); }
  return s || n;
}

function BrandLogo({ size = 36 }) {
  const [broken, setBroken] = useState(!LOGO_URL);
  if (!broken && LOGO_URL) {
    return (
      <img
        src={LOGO_URL}
        alt="Auranest"
        onError={() => setBroken(true)}
        style={{ width: size, height: size, borderRadius: '50%', objectFit: 'cover', flexShrink: 0 }}
      />
    );
  }
  /* Elegant text fallback — always visible even without a logo file */
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: 'linear-gradient(135deg,#c49330,#f6d070)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Playfair Display',serif", fontWeight: 700,
      fontSize: size * 0.4, color: '#fff', letterSpacing: '-.02em'
    }}>A</div>
  );
}

/* ─── DATA ─────────────────────────────────────────────── */
const IN_STATES = [
  'Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat',
  'Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh',
  'Maharashtra','Manipur','Meghalaya','Mizoram','Nagaland','Odisha','Punjab','Rajasthan',
  'Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal',
  'Andaman and Nicobar Islands','Chandigarh','Dadra and Nagar Haveli and Daman and Diu',
  'Delhi','Jammu and Kashmir','Ladakh','Lakshadweep','Puducherry'
];
const US_STATES = [
  'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware',
  'Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky',
  'Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi',
  'Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico',
  'New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania',
  'Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont',
  'Virginia','Washington','West Virginia','Wisconsin','Wyoming'
];

/* ─── HELPERS ───────────────────────────────────────────── */
function cdnImg(url, w) {
  if (!url) return '';
  try { return `https://res.cloudinary.com/dnqtv2gsn/image/fetch/f_auto,q_auto,w_${w}/${encodeURIComponent(url)}`; }
  catch { return url; }
}
const rupee = n => '₹' + Number(n).toLocaleString('en-IN');

const CartStore = {
  get:        ()  => { try { return JSON.parse(localStorage.getItem('auranest_cart') || '[]'); } catch { return []; } },
  save:       (c) => localStorage.setItem('auranest_cart', JSON.stringify(c)),
  clear:      ()  => localStorage.removeItem('auranest_cart'),
  changeQty(id, delta) {
    const c = this.get(), i = c.find(x => x.id === id);
    if (!i) return;
    i.qty += delta;
    this.save(i.qty < 1 ? c.filter(x => x.id !== id) : c);
  },
  remove: (id) => CartStore.save(CartStore.get().filter(x => x.id !== id))
};

/* ─── SHARED UI ─────────────────────────────────────────── */
function Btn({ children, onClick, disabled, loading, variant = 'gold', style = {} }) {
  const cls = `btn-base btn-${variant}`;
  return (
    <button className={cls} onClick={onClick} disabled={disabled || loading} style={style}>
      {loading && <span className="spinner" />}
      {children}
    </button>
  );
}

function FloatInput({ label, id, type = 'text', value, onChange, required, maxLength, inputMode }) {
  return (
    <div className="fl-wrap">
      <input id={id} type={type} className="fl-input" placeholder=" "
        value={value} onChange={e => onChange(e.target.value)}
        required={required} maxLength={maxLength} inputMode={inputMode} />
      <label htmlFor={id} className="fl-label">{label}{required ? ' *' : ''}</label>
    </div>
  );
}

function FloatSelect({ label, id, value, onChange, options, required }) {
  return (
    <div className="fl-wrap" style={{ position: 'relative' }}>
      <select id={id} className={`fl-select${value ? ' fl-has-val' : ''}`}
        value={value} onChange={e => onChange(e.target.value)} required={required}>
        <option value=""> </option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <label htmlFor={id} className="fl-label">{label}{required ? ' *' : ''}</label>
      <span className="fl-arrow">▾</span>
    </div>
  );
}

function OrderSidebar({ cart, isFreeShipping, discount }) {
  const sub   = cart.reduce((a, x) => a + x.price * x.qty, 0);
  const disc  = discount ? Math.round(sub * 0.1) : 0;
  const ship  = isFreeShipping ? 0 : 79;
  const total = sub - disc + ship;
  return (
    <aside className="co-sidebar" style={{
      background: '#fff', borderRadius: 18, padding: 20,
      boxShadow: '0 2px 16px rgba(0,0,0,.06)', border: '1px solid #f0e4c8',
      width: 300, flexShrink: 0
    }}>
      <p style={{ fontFamily: "'Playfair Display',serif", fontWeight: 600, fontSize: '1rem', marginBottom: 14 }}>
        Order Summary
      </p>
      <div style={{ maxHeight: 200, overflowY: 'auto', marginBottom: 14 }}>
        {cart.map(it => (
          <div key={it.id} style={{ display: 'flex', gap: 10, padding: '8px 0', borderBottom: '1px solid #faf5ea' }}>
            <div className="ci-img" style={{ width: 44, height: 44, borderRadius: 8, flexShrink: 0, fontSize: '1.2rem' }}>
              {it.image
                ? <img src={cdnImg(it.image, 120)} alt={it.name} onError={e => e.target.style.display = 'none'} />
                : it.icon || '🏺'}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <p style={{ fontSize: '.8rem', fontWeight: 600, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', lineHeight: 1.3 }}>{trimName(it.name)}</p>
              <p style={{ fontSize: '.75rem', color: 'var(--muted)', marginTop: 2 }}>Qty {it.qty}</p>
            </div>
            <p style={{ fontSize: '.8rem', fontWeight: 700, flexShrink: 0 }}>{rupee(it.price * it.qty)}</p>
          </div>
        ))}
      </div>
      <div style={{ borderTop: '1px solid #f0e4c8', paddingTop: 10 }}>
        <div className="os-row"><span className="os-label">Subtotal</span><span className="os-val">{rupee(sub)}</span></div>
        {disc > 0 && <div className="os-row"><span className="os-label">Discount (10%)</span><span style={{ color: '#16a34a', fontWeight: 600, fontSize: '.88rem' }}>−{rupee(disc)}</span></div>}
        <div className="os-row"><span className="os-label">Shipping</span><span style={{ color: '#16a34a', fontWeight: 600, fontSize: '.88rem' }}>{ship === 0 ? 'FREE' : rupee(ship)}</span></div>
        <div className="os-row" style={{ borderTop: '1px solid #f0e4c8', marginTop: 6, paddingTop: 8 }}>
          <span style={{ fontWeight: 700, color: 'var(--ink)' }}>Total</span>
          <span style={{ fontWeight: 700, color: 'var(--gold)', fontSize: '1rem' }}>{rupee(total)}</span>
        </div>
      </div>
      <p style={{ fontSize: '.73rem', color: 'var(--muted)', textAlign: 'center', marginTop: 12 }}>
        🔒 Secured by 256-bit SSL
      </p>
    </aside>
  );
}

function Stepper({ step }) {
  const labels = ['Cart', 'Details', 'Address', 'Payment'];
  const pct    = ((step - 1) / (labels.length - 1)) * 84;
  return (
    <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', padding: '0 16px', marginBottom: 36 }}>
      <div className="prog-line" />
      <div className="prog-fill" style={{ width: `${pct}%` }} />
      {labels.map((l, i) => (
        <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, zIndex: 2 }}>
          <div className={`step-dot ${i + 1 < step ? 'done' : ''} ${i + 1 === step ? 'active' : ''}`}>
            {i + 1 < step ? '✓' : i + 1}
          </div>
          <span style={{ fontSize: '.72rem', fontWeight: 600, color: i + 1 === step ? 'var(--gold)' : 'var(--muted)', display: 'none' }}
            className="sm-show">{l}</span>
        </div>
      ))}
    </div>
  );
}

/* ─── STEP 1: CART ──────────────────────────────────────── */
function CartPage({ cart, setCart, onNext }) {
  const [promo, setPromo]       = useState('');
  const [promoMsg, setPromoMsg] = useState(null);
  const [discount, setDiscount] = useState(false);

  const updateQty = (id, d) => { CartStore.changeQty(id, d); setCart(CartStore.get()); };
  const removeIt  = (id)    => { CartStore.remove(id); setCart(CartStore.get()); };

  const applyPromo = () => {
    if (promo.trim().toUpperCase() === 'AURA10') {
      setDiscount(true);

                <div style={{ flex: 1, minWidth: 0 }}>

                  <p style={{ color: 'var(--gold)', fontWeight: 700, fontSize: '.9rem', marginBottom: 10 }}>{rupee(it.price)}</p>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>

            ))}
          </div>

          {/* Promo */}
          <div style={{ background: '#fff', borderRadius: 18, padding: 20, boxShadow: '0 2px 16px rgba(0,0,0,.06)', border: '1px solid #f0e4c8' }}>
            <p style={{ fontSize: '.88rem', fontWeight: 700, marginBottom: 12 }}>🏷 Promo Code</p>
            <div style={{ display: 'flex', gap: 10 }}>
              <input className="promo-input" placeholder="Try AURA10" value={promo}
                onChange={e => setPromo(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && applyPromo()} />
              <Btn variant="outline" onClick={applyPromo}>Apply</Btn>
            </div>
            {promoMsg && (
              <p style={{ fontSize: '.78rem', marginTop: 8, fontWeight: 600, color: promoMsg.ok ? '#16a34a' : '#dc2626' }}>
                {promoMsg.text}

        <OrderSidebar cart={cart} isFreeShipping={free} discount={discount} />
      </div>

      <div style={{ marginTop: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <a href="/store/" style={{ fontSize: '.85rem', color: 'var(--muted)', textDecoration: 'none' }}>← Continue Shopping</a>
        <Btn onClick={() => onNext(discount)} style={{ padding: '12px 32px', fontSize: '.95rem' }}>
          Proceed to Checkout →
        </Btn>
      </div>
    </div>
  );
}

/* ─── OTP MODAL — Firebase Phone Auth (free, no API key needed) ─── */
/* ─── helpers defined outside OTPModal so React never unmounts them on re-render ─── */
const handleBox = (arr, setArr, refs, i, val, maxLen) => {
  if (!/^\d?$/.test(val)) return;
  const next = [...arr]; next[i] = val; setArr(next);
  if (val && i < maxLen-1) refs[i+1].current?.focus();
};
const handleBoxBs = (arr, refs, i, e) => {
  if (e.key === 'Backspace' && !arr[i] && i > 0) refs[i-1].current?.focus();
};

const AuthCard = ({ children, onGuest }) => (
  <div style={{ position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.55)',backdropFilter:'blur(6px)' }}>
    <div className="a-scale" style={{ background:'#fff',borderRadius:24,padding:'clamp(20px,5vw,36px) clamp(16px,5vw,32px)',width:'100%',maxWidth:380,boxShadow:'0 24px 60px rgba(0,0,0,.18)' }}>
      <div style={{ textAlign:'center',marginBottom:20 }}>
        <div style={{ display:'flex',justifyContent:'center',marginBottom:8 }}><BrandLogo size={40} /></div>
      </div>
      {children}
      <div style={{ display:'flex',alignItems:'center',gap:12,margin:'16px 0' }}>
        <div style={{ flex:1,height:1,background:'#f0e4c8' }} /><span style={{ fontSize:'.75rem',color:'var(--muted)' }}>or</span><div style={{ flex:1,height:1,background:'#f0e4c8' }} />
      </div>
      <button onClick={onGuest} style={{ width:'100%',fontSize:'.83rem',color:'var(--muted)',background:'none',border:'none',cursor:'pointer',padding:8,fontFamily:'inherit' }}>Continue as Guest →</button>
    </div>
  </div>
);

const BoxRow = ({ arr, setArr, refs, label, maxLen = 4 }) => (
  <div style={{ marginBottom:12 }}>
    <p style={{ fontSize:'.78rem',color:'var(--muted)',marginBottom:6 }}>{label}</p>
    <div style={{ display:'flex',gap:'clamp(4px,2vw,10px)',justifyContent:'center' }}>
      {arr.map((d,i) => (
        <input key={i} ref={refs[i]} className="otp-box" type="password" inputMode="numeric" maxLength={1} value={d}
          style={{ width:'clamp(48px,12vw,56px)',height:'clamp(48px,12vw,56px)',fontSize:'1.3rem' }}
          onChange={e => handleBox(arr, setArr, refs, i, e.target.value, maxLen)}
          onKeyDown={e => handleBoxBs(arr, refs, i, e)} />
      ))}
    </div>
  </div>
);

function OTPModal({ onVerified, onGuest }) {
  // phase: 'phone' | 'pin' | 'otp' | 'profile' | 'new-pin'
  const [phase, setPhase]     = useState('phone');
  const [phone, setPhone]     = useState('');
  const [password, setPassword]   = useState('');
  const [password2, setPassword2] = useState('');
  const [otp, setOtp]         = useState(['','','','','','']);
  const [name, setName]       = useState('');
  const [email, setEmail]     = useState('');
  const [timer, setTimer]     = useState(0);
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState('');
  const [isNewUser, setIsNewUser] = useState(false);
  const confirmRef   = useRef(null);
  const recaptchaRef = useRef(null);
  const verifiedUserRef = useRef(null);
  const otpRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  useEffect(() => {
    if (phase !== 'otp') return;
    setTimer(60);
    otpRefs[0].current?.focus();
    const id = setInterval(() => setTimer(t => t > 1 ? t-1 : (clearInterval(id), 0)), 1000);
    return () => clearInterval(id);
  }, [phase]);

  useEffect(() => {
    // Ensure the global reCAPTCHA is initialised (fallback if page-load init was too early)
    if (window._initRecaptcha) window._initRecaptcha();
  }, []);

  const authErrMsg = e =>
    e.code === 'auth/invalid-phone-number'       ? 'Invalid phone number.' :
    e.code === 'auth/too-many-requests'          ? 'Too many attempts. Try later.' :
    e.code === 'auth/wrong-password'             ? 'Incorrect password. Try again.' :
    e.code === 'auth/invalid-verification-code'  ? 'Incorrect OTP. Check and retry.' :
    e.code === 'auth/code-expired'               ? 'OTP expired. Resend.' :
    e.code === 'auth/internal-error'             ? 'OTP sent — please enter it below.' :
    e.message || 'Something went wrong. Try again.';

  const checkPhone = async () => {
    if (phone.length < 10) { setErr('Enter a valid 10-digit number'); return; }
    setErr(''); setLoading(true);
    try {
      let existing = null;
      try { existing = await window._lookupCustomer(phone); } catch(le) { console.warn('Lookup failed, proceeding as new:', le.message); }
      if (existing && existing.hasPIN) { setIsNewUser(false); setPhase('pin'); }
      else { setIsNewUser(!existing); sendOTP(); return; }
    } catch(e) { setErr(authErrMsg(e)); }
    finally { setLoading(false); }
  };

  const loginWithPIN = async () => {
    if (password.length < 6) { setErr('Enter your password (min 6 characters)'); return; }
    setErr(''); setLoading(true);
    try {
      const cred = await window._fbSignInPIN(phone, password);
      window._setSession(cred.user.uid);
      onVerified(phone, cred.user);
    } catch (e) { setErr(authErrMsg(e)); }
    finally { setLoading(false); }
  };

  const sendOTP = async () => {
    setErr(''); setLoading(true);
    try {
      // Use the global body-level verifier (never inside a fixed/transformed parent)
      const verifier = window._initRecaptcha ? window._initRecaptcha() : recaptchaRef.current;
      if (!verifier) throw new Error('reCAPTCHA not ready. Please refresh the page.');
      confirmRef.current = await window._fbSignInPhone('+91' + phone, verifier);
      setPhase('otp');
    } catch (e) {
      try { recaptchaRef.current?.clear(); } catch {}
      recaptchaRef.current = null;
      setErr(authErrMsg(e));
    } finally { setLoading(false); }
  };

  const verifyOTP = async () => {
    const code = otp.join('');
    if (code.length < 6) { setErr('Enter the 6-digit OTP'); return; }
    setErr(''); setLoading(true);
    try {
      const cred = await confirmRef.current.confirm(code);
      verifiedUserRef.current = cred.user;
      if (isNewUser) { setPhase('profile'); }
      else { setPhase('new-pin'); }
    } catch (e) { setErr(authErrMsg(e)); }
    finally { setLoading(false); }
  };

  const createAccount = async () => {
    if (!name.trim()) { setErr('Please enter your name'); return; }
    if (password.length < 6) { setErr('Password must be at least 6 characters'); return; }
    if (password !== password2) { setErr('Passwords do not match'); return; }
    setErr(''); setLoading(true);
    try {
      const user = verifiedUserRef.current || window._fbAuth?.currentUser;
      if (!user) { setErr('Session expired. Please start again.'); setPhase('phone'); return; }
      window._setSession(user.uid);
      try {
        await window._fbLinkPIN(user, phone, password);
      } catch (linkErr) {
        if (linkErr.code === 'auth/provider-already-linked' || linkErr.code === 'auth/email-already-in-use') {
          const { updatePassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
          await updatePassword(user, password);
        } else { throw linkErr; }
      }
      localStorage.setItem('auranest_name', name.trim());
      try {
        await window._createCustomer(user.uid, { name: name.trim(), email: email.trim(), mobile: phone, hasPIN: true });
      } catch (fsErr) {
        console.warn('Customer profile save failed (check Firestore rules):', fsErr.message);
      }
      onVerified(phone, user, { name: name.trim(), email: email.trim() });
    } catch (e) { setErr(authErrMsg(e)); }
    finally { setLoading(false); }
  };

  const saveNewPIN = async () => {
    if (password.length < 6) { setErr('Password must be at least 6 characters'); return; }
    if (password !== password2) { setErr('Passwords do not match'); return; }
    setErr(''); setLoading(true);
    try {
      const { updatePassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
      const user = verifiedUserRef.current || window._fbAuth?.currentUser;
      if (!user) { setErr('Session expired. Please start again.'); setPhase('phone'); return; }
      window._setSession(user.uid);
      try { await window._fbLinkPIN(user, phone, password); }
      catch { await updatePassword(user, password); }
      const { doc, updateDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      await updateDoc(doc(window._fbDb,'customers',user.uid), { hasPIN: true, lastLogin: serverTimestamp() });
      window._setSession(user.uid);
      onVerified(phone, user);
    } catch (e) { setErr(authErrMsg(e)); }
    finally { setLoading(false); }
  };


  if (phase === 'phone') return (
    <AuthCard onGuest={onGuest}>
      <p style={{ fontFamily:"'Playfair Display',serif",fontSize:'1.2rem',fontWeight:700,textAlign:'center',marginBottom:4 }}>Sign in to continue</p>
      <p style={{ fontSize:'.82rem',color:'var(--muted)',textAlign:'center',marginBottom:16 }}>Enter your mobile to continue</p>
      <div style={{ display:'flex',marginBottom:4 }}>
        <span style={{ display:'flex',alignItems:'center',padding:'0 12px',background:'#fdf8ed',border:'1.5px solid var(--border)',borderRight:'none',borderRadius:'10px 0 0 10px',fontSize:'.85rem',fontWeight:700 }}>🇮🇳 +91</span>
        <input className="fl-input" style={{ borderRadius:'0 10px 10px 0',paddingTop:12,paddingBottom:12 }}
          type="tel" placeholder="10-digit mobile number" value={phone}
          onChange={e => setPhone(e.target.value.replace(/\D/g,'').slice(0,10))}
          onKeyDown={e => e.key==='Enter' && checkPhone()} inputMode="numeric" autoComplete="tel" />
      </div>
      {err && <p style={{ color:'#dc2626',fontSize:'.78rem',marginBottom:8 }}>{err}</p>}
      <Btn onClick={checkPhone} loading={loading} style={{ width:'100%',marginBottom:12 }}>Continue →</Btn>
    </AuthCard>
  );

  if (phase === 'pin') return (
    <AuthCard onGuest={onGuest}>
      <p style={{ fontFamily:"'Playfair Display',serif",fontSize:'1.2rem',fontWeight:700,textAlign:'center',marginBottom:4 }}>Welcome back!</p>
      <p style={{ fontSize:'.82rem',color:'var(--muted)',textAlign:'center',marginBottom:16 }}>+91 {phone}</p>
      <input className="fl-input" type="password" placeholder="Password" value={password}
        onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key==='Enter' && loginWithPIN()}
        style={{ marginBottom:10,paddingTop:12,paddingBottom:12 }} autoFocus />
      {err && <p style={{ color:'#dc2626',fontSize:'.78rem',marginBottom:8 }}>{err}</p>}
      <Btn onClick={loginWithPIN} loading={loading} style={{ width:'100%',marginBottom:8 }}>Login →</Btn>
      <button onClick={() => { setIsNewUser(false); sendOTP(); }} style={{ width:'100%',fontSize:'.78rem',color:'var(--gold)',fontWeight:600,background:'none',border:'none',cursor:'pointer',padding:'6px 0',fontFamily:'inherit' }}>Forgot password? Use OTP →</button>
    </AuthCard>
  );

  if (phase === 'otp') return (
    <AuthCard onGuest={onGuest}>
      <p style={{ fontFamily:"'Playfair Display',serif",fontSize:'1.2rem',fontWeight:700,textAlign:'center',marginBottom:4 }}>Verify your number</p>
      <p style={{ fontSize:'.82rem',color:'var(--muted)',textAlign:'center',marginBottom:16 }}>OTP sent to +91 {phone}</p>
      <div style={{ display:'flex',justifyContent:'center',gap:'clamp(4px,1.5vw,8px)',marginBottom:8 }}>
        {otp.map((d,i) => (
          <input key={i} ref={otpRefs[i]} className="otp-box" type="text" inputMode="numeric" maxLength={1} value={d}
            style={{ width:'clamp(36px,10vw,46px)',height:'clamp(44px,12vw,54px)',fontSize:'clamp(.95rem,3.5vw,1.3rem)' }}
            onChange={e => handleBox(otp, setOtp, otpRefs, i, e.target.value, 6)}
            onKeyDown={e => handleBoxBs(otp, otpRefs, i, e)} />
        ))}
      </div>
      {err && <p style={{ color:'#dc2626',fontSize:'.78rem',textAlign:'center',marginBottom:8 }}>{err}</p>}
      <Btn onClick={verifyOTP} loading={loading} style={{ width:'100%',marginBottom:8 }}>Verify OTP →</Btn>
      <div style={{ textAlign:'center' }}>
        {timer > 0
          ? <p style={{ fontSize:'.78rem',color:'var(--muted)' }}>Resend in {timer}s</p>
          : <button onClick={sendOTP} style={{ fontSize:'.78rem',color:'var(--gold)',fontWeight:700,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit' }}>Resend OTP</button>}
      </div>
    </AuthCard>
  );

  if (phase === 'profile') return (
    <AuthCard onGuest={onGuest}>
      <p style={{ fontFamily:"'Playfair Display',serif",fontSize:'1.2rem',fontWeight:700,textAlign:'center',marginBottom:4 }}>Create your account</p>
      <p style={{ fontSize:'.82rem',color:'var(--muted)',textAlign:'center',marginBottom:16 }}>Save your details for faster checkout</p>
      <input className="fl-input" placeholder="Full Name *" value={name} onChange={e=>setName(e.target.value)} style={{ marginBottom:10,paddingTop:12,paddingBottom:12 }} autoFocus />
      <input className="fl-input" placeholder="Email (optional)" type="email" value={email} onChange={e=>setEmail(e.target.value)} style={{ marginBottom:10,paddingTop:12,paddingBottom:12 }} />
      <input className="fl-input" type="password" placeholder="Set a password (min 6 chars)" value={password}
        onChange={e => setPassword(e.target.value)} style={{ marginBottom:10,paddingTop:12,paddingBottom:12 }} />
      <input className="fl-input" type="password" placeholder="Confirm password" value={password2}
        onChange={e => setPassword2(e.target.value)} onKeyDown={e => e.key==='Enter' && createAccount()}
        style={{ marginBottom:12,paddingTop:12,paddingBottom:12 }} />
      {err && <p style={{ color:'#dc2626',fontSize:'.78rem',marginBottom:8 }}>{err}</p>}
      <Btn onClick={createAccount} loading={loading} style={{ width:'100%' }}>Create Account & Continue →</Btn>
    </AuthCard>
  );

  return (
    <AuthCard onGuest={onGuest}>
      <p style={{ fontFamily:"'Playfair Display',serif",fontSize:'1.2rem',fontWeight:700,textAlign:'center',marginBottom:4 }}>Set a new password</p>
      <p style={{ fontSize:'.82rem',color:'var(--muted)',textAlign:'center',marginBottom:16 }}>You'll use this for future logins</p>
      <input className="fl-input" type="password" placeholder="New password (min 6 chars)" value={password}
        onChange={e => setPassword(e.target.value)} style={{ marginBottom:10,paddingTop:12,paddingBottom:12 }} autoFocus />
      <input className="fl-input" type="password" placeholder="Confirm password" value={password2}
        onChange={e => setPassword2(e.target.value)} onKeyDown={e => e.key==='Enter' && saveNewPIN()}
        style={{ marginBottom:12,paddingTop:12,paddingBottom:12 }} />
      {err && <p style={{ color:'#dc2626',fontSize:'.78rem',marginBottom:8 }}>{err}</p>}
      <Btn onClick={saveNewPIN} loading={loading} style={{ width:'100%' }}>Save Password & Continue →</Btn>
    </AuthCard>
  );
}

function AddressPage({ data, setData, cart, savedAddrs, onNext, onBack }) {
  const [errors, setErrors] = useState({});
  const [useNew, setUseNew] = useState(!savedAddrs?.length);
  const upd = (k, v) => setData(d => ({ ...d, [k]: v }));

  const pickAddr = (a) => {
    setData({ line1:a.line1||'', line2:a.line2||'', city:a.city||'', state:a.state||'', country:'IN', pincode:a.pincode||'' });
    setUseNew(false);
  };
  const states = data.country === 'US' ? US_STATES : IN_STATES;
  const sub = cart.reduce((a, x) => a + x.price * x.qty, 0);

  const validate = () => {
    const e = {};
    if (!data.line1.trim())   e.line1   = 'Required';
    if (!data.city.trim())    e.city    = 'Required';
    if (!data.state)          e.state   = 'Required';
    if (!data.pincode.trim()) e.pincode = 'Required';
    setErrors(e);
    return !Object.keys(e).length;
  };

  return (
    <div className="a-slide">
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: '1.6rem', fontWeight: 700, marginBottom: 6 }}>Delivery Address</h2>
      <p style={{ color: 'var(--muted)', fontSize: '.88rem', marginBottom: 24 }}>Where should we deliver your order?</p>
      <div className="co-layout" style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
        <div style={{ flex: 1, minWidth: 0, background: '#fff', borderRadius: 18, padding: 24, boxShadow: '0 2px 16px rgba(0,0,0,.06)', border: '1px solid #f0e4c8' }}>
          {/* Saved addresses */}
          {savedAddrs?.length > 0 && (
            <div style={{ marginBottom: 20 }}>
              <p style={{ fontSize: '.75rem', fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Saved Addresses</p>
              {savedAddrs.map(a => (
                <div key={a.id} onClick={() => pickAddr(a)} style={{ border: `1.5px solid ${!useNew && data.line1 === a.line1 ? 'var(--gold)' : '#f0e4c8'}`, borderRadius: 12, padding: '10px 14px', marginBottom: 8, cursor: 'pointer', background: !useNew && data.line1 === a.line1 ? '#fffbf0' : '#fff', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <span style={{ fontSize: '1rem', marginTop: 2 }}>{a.label === 'Office' ? '🏢' : '🏠'}</span>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontWeight: 700, fontSize: '.83rem' }}>{a.label || 'Address'}{a.isDefault && <span style={{ marginLeft: 8, fontSize: '.68rem', background: 'var(--gold)', color: '#fff', padding: '1px 7px', borderRadius: 99 }}>Default</span>}</p>
                    <p style={{ fontSize: '.8rem', color: 'var(--muted)' }}>{a.line1}{a.line2 ? ', ' + a.line2 : ''}, {a.city} - {a.pincode}</p>
                  </div>
                </div>
              ))}
              <button onClick={() => setUseNew(true)} style={{ fontSize: '.8rem', color: 'var(--gold)', fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit', padding: '4px 0' }}>+ Add new address</button>
              {!useNew && <hr style={{ margin: '16px 0', borderColor: '#f0e4c8' }} />}
            </div>
          )}
          {(useNew || !savedAddrs?.length) && (<>
          {/* Country */}
          <div style={{ marginBottom: 20 }}>
            <p style={{ fontSize: '.75rem', fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Country</p>
            <div style={{ display: 'flex', gap: 12 }}>
              <button className={`pill${data.country !== 'US' ? ' active' : ''}`}
                onClick={() => { upd('country', 'IN'); upd('state', ''); }}>🇮🇳 India</button>
              <button className={`pill${data.country === 'US' ? ' active' : ''}`}
                onClick={() => { upd('country', 'US'); upd('state', ''); }}>🇺🇸 United States</button>
            </div>
          </div>

          <FloatInput label="Address Line 1" id="l1" value={data.line1} onChange={v => upd('line1', v)} required />
          {errors.line1 && <p style={{ color: '#dc2626', fontSize: '.75rem', marginTop: -10, marginBottom: 8 }}>{errors.line1}</p>}
          <FloatInput label="Address Line 2 (Apt, Suite, etc.)" id="l2" value={data.line2} onChange={v => upd('line2', v)} />

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div>
              <FloatInput label="City / Town" id="ct" value={data.city} onChange={v => upd('city', v)} required />
              {errors.city && <p style={{ color: '#dc2626', fontSize: '.75rem', marginTop: -10, marginBottom: 8 }}>{errors.city}</p>}
            </div>
            <div>
              <FloatInput label={data.country === 'US' ? 'ZIP Code' : 'Pincode'} id="pc"
                value={data.pincode} onChange={v => upd('pincode', v.replace(/\D/g,'').slice(0,6))} inputMode="numeric" required />
              {errors.pincode && <p style={{ color: '#dc2626', fontSize: '.75rem', marginTop: -10, marginBottom: 8 }}>{errors.pincode}</p>}
            </div>
          </div>

          <FloatSelect label="State / Province" id="st" value={data.state}
            onChange={v => upd('state', v)} options={states} required />
          {errors.state && <p style={{ color: '#dc2626', fontSize: '.75rem', marginTop: -10, marginBottom: 8 }}>{errors.state}</p>}

          <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 12, padding: '12px 14px', display: 'flex', gap: 10, alignItems: 'center', marginTop: 8 }}>
            <span style={{ fontSize: '1.2rem' }}>🚚</span>
            <div>
              <p style={{ fontSize: '.8rem', fontWeight: 700, color: '#166534' }}>Estimated Delivery</p>
              <p style={{ fontSize: '.75rem', color: '#15803d' }}>
                {data.country === 'US' ? '7–12 business days' : '2–4 business days'}
              </p>
            </div>

          </>)}
        </div>
        <OrderSidebar cart={cart} isFreeShipping={sub >= 999} discount={false} />

}

/* ─── STEP 4: PAYMENT ───────────────────────────────────── */
function PaymentPage({ cart, address, personal, discount, customerId, onSuccess, onBack }) {
  const [method, setMethod] = useState('upi');
  const [upiId, setUpiId]   = useState('');
  const [card, setCard]     = useState({ num: '', name: '', exp: '', cvv: '' });
  const [bank, setBank]     = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState('');

  const sub   = cart.reduce((a, x) => a + x.price * x.qty, 0);
  const disc  = discount ? Math.round(sub * 0.1) : 0;
  const free  = sub >= 999;
  const total = sub - disc + (free ? 0 : 79);

  const fmtCard = v => v.replace(/\D/g,'').slice(0,16).replace(/(\d{4})(?=\d)/g,'$1 ').trim();
  const fmtExp  = v => { const d = v.replace(/\D/g,'').slice(0,4); return d.length > 2 ? d.slice(0,2)+'/'+d.slice(2) : d; };

  const TABS = [
    { id:'upi',  icon:'📲', label:'UPI' },
    { id:'card', icon:'💳', label:'Card' },
    { id:'net',  icon:'🏦', label:'Net Banking' },
    { id:'cod',  icon:'📦', label:'COD' },
  ];

  const buildCustomer = () => ({
    name:    `${personal.firstName} ${personal.lastName}`.trim(),
    email:   personal.email,
    phone:   personal.phone,
    address: address.line1,
    address2: address.line2,
    city:    address.city,
    state:   address.state,
    country: address.country,
    pincode: address.pincode,
  });

  const buildItems = () => cart.map(i => ({
    id: i.id, name: i.name, price: i.price, qty: i.qty, image: i.image || ''
  }));

  const placeOrder = async () => {
    setError(''); setLoading(true);
    try {
      if (method === 'cod') {
        await new Promise(r => setTimeout(r, 1100));
        const orderId = 'COD-' + Date.now().toString(36).toUpperCase();
        await window._saveOrder({
          orderId,
          customerId:    customerId || null,
          customer:      buildCustomer(),
          items:         buildItems(),
          subtotal:      sub,
          discount:      disc,
          shipping:      free ? 0 : 79,
          totalAmount:   total,
          paymentMethod: 'Cash on Delivery',
          paymentStatus: 'pending',
          orderStatus:   'pending',
        });
        CartStore.clear();
        onSuccess({ orderId, method: 'Cash on Delivery', total });
        return;
      }

      const res = await fetch('/api/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: total, currency: 'INR' })
      });
      if (!res.ok) throw new Error('Order creation failed');
      const { razorpayOrderId, amount, currency, keyId } = await res.json();

      await new Promise((resolve, reject) => {
        const rzp = new window.Razorpay({
          key: keyId, amount, currency, order_id: razorpayOrderId,
          name: 'Auranest Decors',
          description: `${cart.length} item${cart.length > 1 ? 's' : ''}`,
          image: LOGO_URL || undefined,
          prefill: {
            name:    `${personal.firstName} ${personal.lastName}`.trim(),
            email:   personal.email,
            contact: personal.phone ? `+91${personal.phone}` : ''
          },
          theme: { color: '#c49330' },
          handler: async (response) => {
            try {
              const customer = buildCustomer();
              const v = await fetch('/api/verify-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  razorpay_order_id:   response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature:  response.razorpay_signature,
                  orderData: {
                    orderId:     response.razorpay_payment_id,
                    customer,
                    items:       buildItems(),
                    subtotal:    sub,
                    totalAmount: total,
                  },
                })
              });
              if (!v.ok) throw new Error('Verification failed');
              const vData = await v.json();
              await window._saveOrder({
                orderId:             response.razorpay_payment_id,
                customerId:          customerId || null,
                customer,
                items:               buildItems(),
                subtotal:            sub,
                discount:            disc,
                shipping:            free ? 0 : 79,
                totalAmount:         total,
                paymentMethod:       method.toUpperCase(),
                paymentStatus:       'paid',
                orderStatus:         'confirmed',
                razorpayPaymentId:   response.razorpay_payment_id,
                razorpayOrderId:     response.razorpay_order_id,
                shiprocketOrderId:   vData.shiprocketOrderId   || null,
                shiprocketShipmentId: vData.shiprocketShipmentId || null,
              });
              CartStore.clear();
              resolve(response.razorpay_payment_id);
            } catch (e) { reject(e); }
          },
          modal: { ondismiss: () => reject(new Error('dismissed')) }
        });
        rzp.open();
      }).then(pid => onSuccess({ orderId: pid, method: method.toUpperCase(), total }));

    } catch (e) {
      if (e.message !== 'dismissed') setError(e.message || 'Payment failed. Please try again.');
    } finally { setLoading(false); }
  };

  return (
    <div className="a-slide">
      <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: '1.6rem', fontWeight: 700, marginBottom: 6 }}>Payment</h2>
      <p style={{ color: 'var(--muted)', fontSize: '.88rem', marginBottom: 24 }}>Choose your preferred payment method</p>
      <div className="co-layout" style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {/* Tabs */}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20, paddingBottom: 16, borderBottom: '1px solid #f0e4c8' }}>
            {TABS.map(t => (
              <button key={t.id} className={`pay-tab${method === t.id ? ' active' : ''}`} onClick={() => setMethod(t.id)}>
                <span>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>

          <div style={{ background: '#fff', borderRadius: 18, padding: 24, boxShadow: '0 2px 16px rgba(0,0,0,.06)', border: '1px solid #f0e4c8' }}>
            {/* UPI */}
            {method === 'upi' && (
              <div>
                <p style={{ fontWeight: 700, fontSize: '.9rem', marginBottom: 16 }}>Pay via UPI ID</p>
                <FloatInput label="UPI ID (eg. name@paytm)" id="upi" value={upiId} onChange={setUpiId} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
                  <div style={{ flex: 1, height: 1, background: '#f0e4c8' }} />
                  <span style={{ fontSize: '.75rem', color: 'var(--muted)' }}>or choose app</span>
                  <div style={{ flex: 1, height: 1, background: '#f0e4c8' }} />
                </div>
                <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                  {['GPay', 'PhonePe', 'Paytm', 'BHIM'].map(app => (
                    <button key={app} className={`pay-tab${upiId === app ? ' active' : ''}`}
                      style={{ fontSize: '.78rem' }} onClick={() => setUpiId(app)}>{app}</button>
                  ))}
                </div>
              </div>
            )}

            {/* Card */}
            {method === 'card' && (
              <div>
                <div className="card-preview" style={{ marginBottom: 20 }}>
                  <div className="card-chip" />
                  <p style={{ fontFamily: 'monospace', fontSize: '1.05rem', letterSpacing: '.15em', marginBottom: 16, color: 'rgba(255,255,255,.85)', minHeight: 28 }}>
                    {card.num || '•••• •••• •••• ••••'}
                  </p>
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <div>
                      <p style={{ fontSize: '.65rem', color: 'rgba(255,255,255,.5)', textTransform: 'uppercase', letterSpacing: '.08em' }}>Card Holder</p>
                      <p style={{ fontSize: '.88rem', fontWeight: 600 }}>{card.name || 'YOUR NAME'}</p>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <p style={{ fontSize: '.65rem', color: 'rgba(255,255,255,.5)', textTransform: 'uppercase', letterSpacing: '.08em' }}>Expires</p>
                      <p style={{ fontSize: '.88rem', fontWeight: 600 }}>{card.exp || 'MM/YY'}</p>
                    </div>
                  </div>
                </div>
                <FloatInput label="Card Number" id="cnum" value={card.num}
                  onChange={v => setCard(c => ({...c, num: fmtCard(v)}))} inputMode="numeric" />
                <FloatInput label="Card Holder Name" id="cname" value={card.name}
                  onChange={v => setCard(c => ({...c, name: v}))} />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <FloatInput label="MM/YY" id="cexp" value={card.exp}
                    onChange={v => setCard(c => ({...c, exp: fmtExp(v)}))} inputMode="numeric" />
                  <FloatInput label="CVV" id="ccvv" type="password" value={card.cvv}
                    onChange={v => setCard(c => ({...c, cvv: v.replace(/\D/g,'').slice(0,4)}))} inputMode="numeric" />
                </div>
                <p style={{ fontSize: '.75rem', color: 'var(--muted)' }}>🔒 Your card details are encrypted and secure</p>
              </div>
            )}

            {/* Net Banking */}
            {method === 'net' && (
              <div>
                <p style={{ fontWeight: 700, fontSize: '.9rem', marginBottom: 16 }}>Select your bank</p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 16 }}>
                  {['SBI', 'HDFC', 'ICICI', 'Axis', 'Kotak', 'Yes Bank'].map(b => (
                    <button key={b} onClick={() => setBank(b)}
                      style={{
                        padding: '12px 8px', borderRadius: 12, border: `2px solid ${bank === b ? 'var(--gold)' : '#f0e4c8'}`,
                        background: bank === b ? '#fffbf0' : '#fff', color: bank === b ? 'var(--gold)' : 'var(--ink)',
                        fontWeight: 700, fontSize: '.82rem', cursor: 'pointer', fontFamily: 'inherit'
                      }}>{b}</button>
                  ))}
                </div>
                <FloatSelect label="Other banks" id="obank" value={bank}
                  onChange={setBank}
                  options={['Punjab National Bank','Union Bank','Bank of Baroda','Canara Bank','IndusInd Bank','Federal Bank']} />
              </div>
            )}

            {/* COD */}
            {method === 'cod' && (
              <div>
                <div style={{ display: 'flex', gap: 16, alignItems: 'center', marginBottom: 16 }}>
                  <span style={{ fontSize: '2.5rem' }}>📦</span>
                  <div>
                    <p style={{ fontWeight: 700, fontSize: '.95rem' }}>Cash on Delivery</p>
                    <p style={{ fontSize: '.83rem', color: 'var(--muted)', marginTop: 4 }}>
                      Pay when your order arrives. COD fee ₹40 may apply on orders below ₹500.
                    </p>
                  </div>
                </div>
                <div style={{ background: '#fdf8ed', borderRadius: 12, padding: '10px 14px' }}>
                  <p style={{ fontSize: '.78rem', color: 'var(--muted)' }}>
                    ✅ No advance payment &nbsp;·&nbsp; ✅ Pay in cash at delivery
                  </p>
                </div>
              </div>
            )}
          </div>

          {error && (
            <div style={{ marginTop: 14, background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 12, padding: '12px 16px', fontSize: '.85rem', color: '#dc2626' }}>
              ⚠️ {error}
            </div>
          )}
        </div>
        <OrderSidebar cart={cart} isFreeShipping={free} discount={discount} />
      </div>

      <div style={{ marginTop: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <Btn variant="ghost" onClick={onBack}>← Back</Btn>
        <Btn onClick={placeOrder} loading={loading} style={{ padding: '14px 36px', fontSize: '1rem' }}>
          {loading ? 'Processing…' : `Pay ${rupee(total)}`}
        </Btn>
      </div>
    </div>
  );
}

/* ─── Auth helpers ───────────────────────────────────────── */
const authReady = () => new Promise(res => {
  if (window._fbAuth !== undefined) { res(); return; }
  const t = setInterval(() => { if (window._fbAuth !== undefined) { clearInterval(t); res(); } }, 50);
});

/* ─── MAIN APP ──────────────────────────────────────────── */
function App() {
  const [step, setStep]         = useState(1);
  const [cart, setCart]         = useState(() => CartStore.get());
  const [showOTP, setShowOTP]   = useState(false);
  const [discount, setDiscount] = useState(false);
  const [result, setResult]     = useState(null);
  const [customer, setCustomer] = useState(null);
  const [savedAddrs, setSavedAddrs] = useState([]);
  const [personal, setPersonal] = useState({ firstName:'', lastName:'', email:'', phone:'' });
  const [address,  setAddress]  = useState({ line1:'', line2:'', city:'', state:'', country:'IN', pincode:'' });

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [step]);

  // Load Razorpay script
  useEffect(() => {
    if (document.getElementById('rzp-script')) return;
    const s  = document.createElement('script');
    s.id  = 'rzp-script';
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    document.head.appendChild(s);
  }, []);

  // Listen for Firebase auth ready + auto-fill from customer profile
  useEffect(() => {
    window._onAuthReady = (user, profile) => {
      if (!profile) return;
      const nameParts = (profile.name || '').trim().split(' ');
      setCustomer(profile);
      setPersonal(p => ({
        ...p,
        firstName: nameParts[0] || '',
        lastName:  nameParts.slice(1).join(' ') || '',
        email:     profile.email || '',
        phone:     profile.mobile || '',
      }));
      const addrs = window._fbAddresses || [];
      setSavedAddrs(addrs);
      const def = window._fbDefaultAddr;
      if (def) setAddress({ line1:def.line1||'', line2:def.line2||'', city:def.city||'', state:def.state||'', country:'IN', pincode:def.pincode||'' });
    };
    if (window._fbCustomer) window._onAuthReady(window._fbUser, window._fbCustomer);
    return () => { window._onAuthReady = null; };
  }, []);

  const goNext = () => setStep(s => s + 1);
  const goBack = () => setStep(s => s - 1);

  const handleCartNext = (d) => {
    setDiscount(d);
    if (window._getSession?.() && window._fbUser) { goNext(); return; }
    setShowOTP(true);
  };

  const handleOtpVerified = (phone, user, profile) => {
    const nameParts = (profile?.name || '').trim().split(' ');
    setPersonal(p => ({
      ...p, phone,
      firstName: nameParts[0] || p.firstName,
      lastName:  nameParts.slice(1).join(' ') || p.lastName,
      email:     profile?.email || p.email,
    }));
    if (profile) setCustomer({ uid: user?.uid, ...profile });
    setShowOTP(false);
    goNext();
  };

  return (
    <div>
      {/* Navbar */}
      <nav className="co-nav">
        <a href="/store/" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: 'var(--ink)' }}>
          <BrandLogo size={30} />
          <span style={{ fontFamily: "'Playfair Display',serif", fontSize: '1.05rem', fontWeight: 700 }}>Auranest Decors</span>
        </a>
        <div style={{ flex: 1 }} />
        <p style={{ fontSize: '.78rem', color: 'var(--muted)', fontWeight: 600 }}>🔒 Secure Checkout</p>
      </nav>

      <main style={{ maxWidth: 960, margin: '0 auto', padding: 'clamp(16px,4vw,32px) clamp(10px,3vw,16px)' }}>
        {/* Progress — hide on success */}
        {step <= 4 && <Stepper step={step} />}

        {/* Auth Modal */}
        {showOTP && (
          <OTPModal
            onVerified={handleOtpVerified}
            onGuest={() => { setShowOTP(false); goNext(); }}
          />
        )}

        {step === 1 && (
          <CartPage cart={cart} setCart={setCart}
            onNext={handleCartNext} />
        )}
        {step === 2 && !showOTP && (
          <PersonalPage data={personal} setData={setPersonal} cart={cart} onNext={goNext} onBack={() => setStep(1)} />
        )}
        {step === 3 && (
          <AddressPage data={address} setData={setAddress} cart={cart} savedAddrs={savedAddrs} onNext={goNext} onBack={() => setStep(2)} />
        )}
        {step === 4 && (
          <PaymentPage cart={cart} address={address} personal={personal} discount={discount}
            customerId={customer?.uid || null}
            onSuccess={r => { setResult(r); setStep(5); }} onBack={() => setStep(3)} />
        )}
        {step === 5 && result && (
          <SuccessPage orderId={result.orderId} method={result.method} total={result.total} />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
