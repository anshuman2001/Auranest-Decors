name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI tools
        run: npm install -g vercel@latest firebase-tools@latest

      - name: Deploy Firestore Rules
        # Non-blocking: skips when FIREBASE_TOKEN secret is unset, and never
        # fails the run. Rules can also be deployed via the Firebase Console.
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "FIREBASE_TOKEN not set — skipping Firestore rules deploy."
            exit 0
          fi
          firebase deploy --only firestore:rules --project auranest-decors --token="$FIREBASE_TOKEN"

      - name: Deploy to Vercel (Production)
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
