<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8934a;--gold-lt:#d4a85c;--gold-pale:#f5ecd8;
  --ink:#1c1a18;--mid:#5a5550;--light:#aca89f;
  --border:#ece8e1;--dark:#1c1a18;--cream:#faf8f5;
}
body{
  font-family:'DM Sans',sans-serif;
  background:#ddd8d0;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

/* ══ LOADING SCREEN ══ */
#ls{
  position:fixed;inset:0;z-index:9999;
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.ls-ring{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#c49330,#f6d070);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#fff;
  box-shadow:0 0 0 8px rgba(184,147,74,.18);
}
.ls-brand{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.14em;color:var(--gold);}
.ls-sub{font-size:12px;letter-spacing:.08em;color:#7a7268;text-transform:uppercase;}
.ls-bar{width:260px;height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden;}
.ls-fill{height:100%;width:0%;background:var(--gold);border-radius:3px;transition:width .25s ease;}
.ls-txt{font-size:12px;color:#5a5550;}

/* ══ PAGE WRAPPER ══ */
.wrap{display:flex;flex-direction:column;align-items:center;padding:24px 16px;gap:16px;}

/* ══ EVERY A4 PAGE ══ */
.pg{
  width:210mm;height:297mm;
  background:#fff;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.22);
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

/* ══ COVER ══ */
.cover{
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
}
.cv-corner{position:absolute;width:44mm;height:44mm;opacity:.22;}
.cv-corner.tl{top:0;left:0;}
.cv-corner.tr{top:0;right:0;transform:scaleX(-1);}
.cv-corner.bl{bottom:0;left:0;transform:scaleY(-1);}
.cv-corner.br{bottom:0;right:0;transform:scale(-1,-1);}

.cv-logo{
  width:26mm;height:26mm;border-radius:50%;
  background:linear-gradient(135deg,#c49330,#f6d070);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:34pt;font-weight:700;color:#fff;
  margin-bottom:8mm;
  box-shadow:0 0 0 4mm rgba(184,147,74,.18);
}
.cv-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:30pt;font-weight:700;letter-spacing:.14em;color:var(--gold);
  margin-bottom:5mm;
}
.cv-line{width:50mm;height:.5mm;background:var(--gold);margin:0 auto 6mm;}
.cv-yr{
  font-size:11pt;letter-spacing:.22em;text-transform:uppercase;
  color:#f5ecd8;font-weight:300;margin-bottom:6mm;
}
.cv-tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:14pt;color:#aca89f;margin-bottom:12mm;
}
.cv-chips{display:flex;gap:4mm;justify-content:center;flex-wrap:wrap;margin-bottom:14mm;}
.cv-chip{
  padding:2mm 5mm;border:1px solid rgba(184,147,74,.4);border-radius:20mm;
  font-size:8pt;letter-spacing:.06em;color:#7a7268;
}
.cv-count{font-size:10pt;color:#5a5550;}
.cv-foot{
  position:absolute;bottom:10mm;left:0;right:0;text-align:center;
  font-size:8.5pt;color:#3d3830;letter-spacing:.04em;
}
.cv-foot span{color:rgba(184,147,74,.6);}

/* ══ PRODUCT PAGE HEADER ══ */
.ph{
  height:13mm;background:var(--dark);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8mm;flex-shrink:0;
}
.ph-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:10.5pt;font-weight:700;letter-spacing:.12em;color:var(--gold);
}
.ph-right{font-size:7.5pt;color:#4a4540;letter-spacing:.04em;}

/* ══ PRODUCT GRID ══ */
.pg-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4.5mm;
  padding:4.5mm 4.5mm 0;
  /* height = 297mm - 13mm header - 9mm footer - 4.5mm bottom pad */
  height:270.5mm;
  overflow:hidden;
}
.card{
  border:1px solid var(--border);
  border-radius:3.5mm;
  overflow:hidden;background:#fff;
  display:flex;flex-direction:column;
}
.card-img{
  flex:0 0 52mm;
  background:var(--gold-pale);
  overflow:hidden;position:relative;
}
.card-img img{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
.card-badge{
  position:absolute;top:2.5mm;left:2.5mm;
  background:var(--gold);color:#fff;
  font-size:6pt;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  padding:1.2mm 2.8mm;border-radius:20mm;
}
.card-body{
  flex:1;padding:3mm 3.5mm 2.5mm;
  display:flex;flex-direction:column;gap:1.5mm;
}
.card-name{
  font-family:'Cormorant Garamond',serif;
  font-size:10pt;font-weight:700;color:var(--ink);line-height:1.25;
}
.card-desc{
  font-size:7pt;color:var(--mid);line-height:1.45;
}
.card-line{
  margin-top:auto;padding-top:2mm;
  border-top:.3mm solid var(--border);
  font-size:6.5pt;color:var(--light);letter-spacing:.03em;
}

/* ══ PRODUCT PAGE FOOTER ══ */
.pf{
  position:absolute;bottom:0;left:0;right:0;height:9mm;
  border-top:.3mm solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8mm;
}
.pf-l{font-size:7pt;color:var(--light);}
.pf-r{font-size:7pt;color:var(--gold);font-weight:600;letter-spacing:.04em;}

/* ══ PRINT ══ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  @page{size:A4 portrait;margin:0;}
  body{background:#fff!important;}
  #ls{display:none!important;}
  .wrap{padding:0;gap:0;}
  .pg{
    box-shadow:none!important;margin:0!important;
    page-break-after:always;break-after:page;
  }
  .pg:last-child{page-break-after:avoid;break-after:avoid;}
}
</style>

function tick() {
  loaded++;
  const pct = Math.round(loaded / total * 100);
  fillEl.style.width = pct + '%';
  txtEl.textContent  = loaded + ' / ' + total + ' images ready…';
  if (loaded >= total && !fired) go();
}

function go() {
  fired = true;
  txtEl.textContent = 'Opening print dialog…';
  setTimeout(() => {
    document.getElementById('ls').style.display = 'none';
    window.print();
    /* restore loading screen so user can re-print */
    document.getElementById('ls').style.display = 'flex';
    txtEl.textContent = 'Done! Press Ctrl+P to print again.';
  }, 700);
}

imgs.forEach(img => {
  if (img.complete && img.naturalWidth > 0) { tick(); }
  else {
    img.addEventListener('load',  tick, {once:true});
    img.addEventListener('error', tick, {once:true});
  }
});

/* safety net — force print after 22 s */
setTimeout(() => { if (!fired) go(); }, 22000);
</script>
</body>
</html>
