<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Auranest Decors — Product Catalogue 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyAMkNFmL_amzlWMBxyzlVbn06GhZJGnadk",
  authDomain:"auranest-decors.firebaseapp.com",
  projectId:"auranest-decors",
  storageBucket:"auranest-decors.firebasestorage.app",
  messagingSenderId:"55244789649",
  appId:"1:55244789649:web:0aab804a8933ce0cf6ec30"
});
const db = getFirestore(app);
window._fetchAllProducts = async () => {
  try {
    const snap = await getDocs(query(collection(db,'products'), orderBy('createdAt','asc')));
    return snap.docs.map(d => ({id:d.id,...d.data()}));
  } catch {
    const snap = await getDocs(collection(db,'products'));
    return snap.docs.map(d => ({id:d.id,...d.data()}));
  }
};
</script>

<style>
/* ══════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════ */
:root{
  --ivory:   #F8F5EF;
  --ivory2:  #F2EDE4;
  --gold:    #B88A3B;
  --gold-lt: #D4A84B;
  --gold-bg: rgba(184,138,59,.08);
  --ink:     #2B2B2B;
  --mid:     #6B5E4A;
  --muted:   #9A8870;
  --border:  rgba(184,138,59,.22);
  --card:    #FFFFFF;
  --shadow:  0 1px 8px rgba(43,35,20,.07);
}

/* ══════════════════════════════════════════════════════
   SCREEN CHROME
══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#C8BDB0;font-size:10px}
body{font-family:'Inter',sans-serif;background:#C8BDB0;color:var(--ink)}

.toolbar{
  position:sticky;top:0;z-index:999;
  background:var(--ink);color:#fff;
  padding:12px 28px;display:flex;align-items:center;gap:16px;
}
.toolbar-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500;letter-spacing:.05em;flex:1}
.toolbar-info{font-size:.82rem;color:rgba(255,255,255,.5)}
.btn-pdf{
  background:var(--gold);color:#fff;border:none;
  padding:9px 22px;font-family:'Inter',sans-serif;font-size:.8rem;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;border-radius:4px;display:flex;align-items:center;gap:7px
}
.btn-pdf:hover{background:var(--gold-lt)}
.btn-pdf:disabled{opacity:.5;cursor:not-allowed}
.btn-pdf svg{width:14px;height:14px;flex-shrink:0}

#catalogue{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:20px 0 40px
}

/* ══════════════════════════════════════════════════════
   PAGE SHELL  (794px × 1123px = A4 at 96dpi)
══════════════════════════════════════════════════════ */
.pg{
  width:794px;height:1123px;
  background:var(--ivory);
  box-shadow:0 4px 28px rgba(0,0,0,.22);
  position:relative;overflow:hidden;flex-shrink:0;
}

/* ══════════════════════════════════════════════════════
   COVER PAGE
══════════════════════════════════════════════════════ */
.pg-cover{
  display:flex;flex-direction:column;
  padding:0;background:var(--ivory);
}
/* Top band */
.cov-top{
  background:var(--ink);
  padding:36px 52px 32px;
  position:relative;overflow:hidden;
}
.cov-top::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)
}
.cov-eyebrow{
  font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(255,255,255,.4);margin-bottom:14px;font-weight:400
}
.cov-brand{
  font-family:'Cormorant Garamond',serif;font-size:3.6rem;font-weight:300;
  color:#fff;letter-spacing:.03em;line-height:1;margin-bottom:6px
}
.cov-brand em{font-style:italic;color:var(--gold-lt)}
.cov-tagline{
  font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;
  color:rgba(255,255,255,.55);letter-spacing:.1em;margin-top:10px
}
.cov-divider{
  display:flex;align-items:center;gap:12px;
  margin:16px 0 0;max-width:320px
}
.cov-divider-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.cov-divider-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* Collage grid */
.cov-collage{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  grid-template-rows:220px 180px;
  gap:3px;flex:1;
  background:var(--ink)
}
.cov-cell{overflow:hidden;position:relative}
.cov-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cov-cell-placeholder{width:100%;height:100%;background:var(--ivory2);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--border)}
.cov-cell:first-child{grid-row:1/3}

/* Bottom band */
.cov-bot{
  background:var(--ink);
  padding:18px 52px;
  display:flex;align-items:center;justify-content:space-between;
}
.cov-url{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;
  letter-spacing:.08em;color:var(--gold-lt)
}
.cov-year{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.cov-count{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35)}

/* ══════════════════════════════════════════════════════
   PRODUCT PAGES
══════════════════════════════════════════════════════ */
.pg-products{
  padding:28px 30px 24px;
  background:var(--ivory);
  display:flex;flex-direction:column;
}

/* Page header */
.pg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
  margin-bottom:18px;flex-shrink:0;
}
.pg-header-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold)
}
.pg-header-cat{
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);font-weight:400
}
.pg-num{
  font-size:.65rem;letter-spacing:.1em;color:var(--muted)
}

/* Product grid — 4 across */
.prod-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  flex:1;
  align-content:start;
}

/* Individual card */
.pc{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.pc-img{
  width:100%;height:148px;
  background:var(--ivory2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
}
.pc-img img{
  max-width:100%;max-height:100%;
  width:100%;height:100%;
  object-fit:contain;display:block;padding:8px;
}
.pc-img-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;background:var(--ivory2);
}
.pc-img-ph span{font-size:1.8rem}
.pc-img-ph p{font-size:.55rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.pc-body{
  padding:9px 10px 10px;flex:1;display:flex;flex-direction:column;gap:4px;
}
.pc-badge{
  font-size:.55rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold);background:var(--gold-bg);
  padding:2px 7px;border-radius:2px;align-self:flex-start;
  border:1px solid rgba(184,138,59,.18);
}
.pc-name{
  font-family:'Cormorant Garamond',serif;
  font-size:.88rem;font-weight:600;line-height:1.3;
  color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-top:2px;
}
.pc-sep{height:1px;background:var(--border);margin:4px 0;flex-shrink:0}
.pc-meta{font-size:.6rem;color:var(--muted);line-height:1.7}
.pc-meta strong{color:var(--ink);font-weight:500}

/* Page footer */
.pg-footer{
  margin-top:auto;padding-top:10px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.pg-footer-brand{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.pg-footer-url{font-size:.6rem;color:var(--muted)}

/* ══════════════════════════════════════════════════════
   PRINT  — the critical section
══════════════════════════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:0}

  /* Force every bg and color to print exactly */
  *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
    color-adjust:exact!important;
  }

  html{background:#fff!important;font-size:10px}
  body{background:#fff!important}
  .toolbar{display:none!important}

  /* Block layout — flex container + page-break = phantom blank pages */
  #catalogue{
    display:block!important;
    padding:0!important;gap:0!important;
    background:#fff!important;
  }

  .pg{
    display:block!important;
    width:210mm!important;
    height:297mm!important;
    min-height:unset!important;
    max-height:297mm!important;
    overflow:hidden!important;
    box-shadow:none!important;
    page-break-after:always!important;
    break-after:page!important;
    page-break-inside:avoid!important;
    break-inside:avoid!important;
  }
  .pg:last-child{page-break-after:avoid!important;break-after:avoid!important}

  /* Cover */
  .pg-cover{display:flex!important;flex-direction:column!important}
  .cov-top{background:#2B2B2B!important;color:#fff!important}
  .cov-bot{background:#2B2B2B!important}
  .cov-collage{background:#2B2B2B!important}

  /* Product pages */
  .pg-products{background:#F8F5EF!important}
  .pc{background:#fff!important;border:1px solid rgba(184,138,59,.22)!important;break-inside:avoid!important;page-break-inside:avoid!important}
  .pc-img{background:#F2EDE4!important;height:148px!important}
  .pc-img-ph{background:#F2EDE4!important}
  .pc-badge{background:rgba(184,138,59,.08)!important;border:1px solid rgba(184,138,59,.18)!important}
  .pg-header{border-bottom:1px solid rgba(184,138,59,.22)!important}
  .pg-footer{border-top:1px solid rgba(184,138,59,.22)!important}
  .pc-sep{background:rgba(184,138,59,.22)!important}

  /* Keep prod-grid layout in print */
  .prod-grid{grid-template-columns:repeat(4,1fr)!important;gap:10px!important}
}
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Auranest Decors — Product Catalogue</span>
  <span class="toolbar-info" id="toolbarInfo">Loading products…</span>
  <button class="btn-pdf" id="dlBtn" onclick="window.print()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 16l-4-4h3V4h2v8h3l-4 4z"/><path d="M20 18H4v-2h16v2z"/></svg>
    Download PDF
  </button>
</div>

<div id="catalogue">
  <!-- Cover inserted by JS -->
</div>

<script>
/* ── helpers ── */
const $ = id => document.getElementById(id);
const rupee = n => '₹' + Number(n).toLocaleString('en-IN');

function getImage(p) {
  const arr = (p.images||[]).filter(u=>u&&u.trim());
  return arr[0] || p.image || '';
}

function catImg(raw, w=500) {
  if (!raw || !raw.trim()) return '';
  try {
    if (raw.includes('res.cloudinary.com') && raw.includes('/upload/')) {
      const parts = raw.split('/upload/');
      // strip existing transforms (version, quality etc.) then add ours
      let rest = parts[1];
      // remove leading transform segment if present (starts with f_, q_, w_, v, or c_)
      rest = rest.replace(/^((?:[a-z_]+[^\/]*,?)+\/)(?=[a-z])/,'');
      return `${parts[0]}/upload/f_auto,q_auto,w_${w},c_pad,b_white/${rest}`;
    }
    return raw;
  } catch { return raw; }
}

function trimName(n) {
  if (!n) return '';
  let s = n.split('|')[0].trim();
  // remove overly long suffix after comma
  if (s.length > 62) { const c = s.indexOf(',', 30); if (c > 0) s = s.slice(0, c).trim(); }
  return s;
}

function getCategory(p) {
  const c = (p.category||'').toLowerCase().trim();
  const MAP = {artisan:'Artisan',woodcraft:'Woodcraft',minimal:'Minimal',gifting:'Gifting','home & kitchen':'Home & Kitchen','aura décor':'Aura Décor','aura decor':'Aura Décor'};
  if (MAP[c]) return MAP[c];
  const n = (p.name||'').toLowerCase();
  if (/madhubani|warli|folk|tribal|painted|mithila|gond|pichwai/.test(n)) return 'Artisan';
  if (/wood|tray|jharokha|kitchen|spatula|stool|bench|platter/.test(n)) return 'Woodcraft';
  if (/ceramic|terracotta|buddha|yoga|pot|planter/.test(n)) return 'Minimal';
  if (/gift|set|combo|hamper/.test(n)) return 'Gifting';
  return 'Artisan';
}

const CAT_ICON = {Artisan:'🎨',Woodcraft:'🪵',Minimal:'🏺',Gifting:'🎁','Home & Kitchen':'🏠','Aura Décor':'✨'};

/* ── Cover page ── */
function buildCover(products, total) {
  // Pick up to 5 products with images for collage
  const withImg = products.filter(p => getImage(p));
  const collageProds = withImg.slice(0, 5);

  const cells = collageProds.map((p, i) => {
    const img = catImg(getImage(p), 800);
    return `<div class="cov-cell">
      ${img ? `<img src="${img}" alt="${trimName(p.name)}" loading="eager" onerror="this.parentElement.innerHTML='<div class=cov-cell-placeholder>❋</div>'"/>` : '<div class="cov-cell-placeholder">❋</div>'}
    </div>`;
  }).join('');

  // fill to 5 cells if fewer
  const placeholders = Array(Math.max(0, 5 - collageProds.length)).fill('<div class="cov-cell"><div class="cov-cell-placeholder">❋</div></div>').join('');

  const pg = document.createElement('div');
  pg.className = 'pg pg-cover';
  pg.innerHTML = `
    <!-- Top branding band -->
    <div class="cov-top">
      <p class="cov-eyebrow">Exclusive Product Catalogue · 2025</p>
      <h1 class="cov-brand">Auranest <em>Decors</em></h1>
      <div class="cov-divider"><div class="cov-divider-line"></div><div class="cov-divider-dot"></div><div class="cov-divider-line"></div></div>
      <p class="cov-tagline">Handcrafted Indian Home Décor</p>
    </div>

    <!-- Product collage -->
    <div class="cov-collage">
      ${cells}${placeholders}
    </div>

    <!-- Bottom info band -->
    <div class="cov-bot">
      <span class="cov-url">www.auranestdecors.com</span>
      <span class="cov-count">${total} Handcrafted Pieces</span>
      <span class="cov-year">© 2025</span>
    </div>`;
  return pg;
}

/* ── Product card HTML ── */
function productCard(p) {
  const img  = catImg(getImage(p), 400);
  const cat  = getCategory(p);
  const icon = CAT_ICON[cat] || '✦';
  const name = trimName(p.name);
  const mat  = p.material || '';
  const sz   = p.size || '';
  const tag  = p.tag || cat;

  const imgHTML = img
    ? `<img src="${img}" alt="${name}" loading="lazy"
         onerror="this.parentElement.innerHTML='<div class=pc-img-ph><span>${icon}</span><p>${cat}</p></div>'"/>`
    : `<div class="pc-img-ph"><span>${icon}</span><p>${cat}</p></div>`;

  return `<div class="pc">
    <div class="pc-img">${imgHTML}</div>
    <div class="pc-body">
      <span class="pc-badge">${tag}</span>
      <p class="pc-name">${name}</p>
      <div class="pc-sep"></div>
      ${mat ? `<p class="pc-meta"><strong>Material</strong> ${mat}</p>` : ''}
      ${sz  ? `<p class="pc-meta"><strong>Size</strong> ${sz}</p>`      : ''}
      <p class="pc-meta"><strong>Category</strong> ${cat}</p>
    </div>
  </div>`;
}

/* ── Build product pages ── */
const PER_PAGE = 12; // 4 columns × 3 rows

function buildProductPages(products) {
  const pages = [];
  let pageIdx = 1; // cover = page 1

  for (let i = 0; i < products.length; i += PER_PAGE) {
    pageIdx++;
    const batch = products.slice(i, i + PER_PAGE);
    const cards = batch.map(productCard).join('');

    // Determine which categories appear on this page
    const cats = [...new Set(batch.map(getCategory))];
    const catLabel = cats.length === 1 ? cats[0] + ' Collection' : 'All Collections';

    const pg = document.createElement('div');
    pg.className = 'pg pg-products';
    pg.innerHTML = `
      <div class="pg-header">
        <span class="pg-header-brand">Auranest Decors</span>
        <span class="pg-header-cat">${catLabel}</span>
        <span class="pg-num">— ${pageIdx} —</span>
      </div>
      <div class="prod-grid">${cards}</div>
      <div class="pg-footer">
        <span class="pg-footer-brand">Auranest Decors · Handcrafted Indian Décor</span>
        <span class="pg-footer-url">www.auranestdecors.com</span>
      </div>`;
    pages.push(pg);
  }
  return pages;
}

/* ── Deduplicate ── */
function dedupe(products) {
  const seenImgs = new Set();
  const seenNames = new Set();
  return products.filter(p => {
    const img  = getImage(p);
    const imgKey  = img ? img.replace(/\?.*$/, '').split('/').slice(-2).join('/') : null;
    const nameKey = (p.name || '').toLowerCase().trim().slice(0, 40);
    if (imgKey && seenImgs.has(imgKey))    return false;
    if (!imgKey && seenNames.has(nameKey)) return false;
    if (imgKey) seenImgs.add(imgKey);
    else seenNames.add(nameKey);
    return true;
  });
}

/* ── Main builder ── */
async function build() {
  const info  = $('toolbarInfo');
  const dlBtn = $('dlBtn');
  const cat   = $('catalogue');

  try {
    info.textContent = 'Connecting to Firebase…';
    let raw = [];

    try {
      raw = await window._fetchAllProducts();
    } catch(e) {
      // Fallback: localStorage cache (populated when store page loads)
      info.textContent = 'Using cached data…';
      const cached = localStorage.getItem('auranest_products');
      if (cached) raw = JSON.parse(cached).filter(p => p && p.name);
    }

    if (!raw.length) {
      info.textContent = '⚠ No products found. Visit auranestdecors.com/store/ first to cache data, then reload.';
      return;
    }

    info.textContent = `Deduplicating ${raw.length} products…`;
    const products = dedupe(raw);
    info.textContent = `Building catalogue: ${products.length} products…`;

    // Render cover
    cat.appendChild(buildCover(products, products.length));

    // Render product pages in batches to avoid blocking the main thread
    const CHUNK = 12;
    for (let i = 0; i < products.length; i += CHUNK * PER_PAGE) {
      const slice = products.slice(i, i + CHUNK * PER_PAGE);
      const pages = buildProductPages(slice.slice(0, CHUNK * PER_PAGE));
      // correct page numbers
      pages.forEach(pg => cat.appendChild(pg));
      await new Promise(r => setTimeout(r, 0)); // yield to browser
    }

    // Fix page numbers sequentially
    const allPages = cat.querySelectorAll('.pg-num');
    allPages.forEach((el, i) => { el.textContent = `— ${i + 2} —`; });

    const totalPages = products.length > 0 ? Math.ceil(products.length / PER_PAGE) + 1 : 1;
    info.textContent = `✓ ${products.length} products · ${totalPages} pages · Ready to download`;
    dlBtn.disabled = false;

  } catch(e) {
    info.textContent = '⚠ Error: ' + e.message;
    console.error(e);
  }
}

window.addEventListener('load', () => setTimeout(build, 500));
</script>
</body>
</html>
